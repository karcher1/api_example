openapi: 3.0.3
info:
  title: Example Commerce API
  version: 1.0.0
  description: A sample OpenAPI document used to demonstrate generated endpoint pages.
servers:
  - url: https://api.example.com/v1
tags:
  - name: Users
    description: Customer identity and profile endpoints.
  - name: Orders
    description: Order lookup and fulfillment endpoints.
paths:
  /users:
    get:
      tags: [Users]
      operationId: listUsers
      summary: List users
      description: Returns a paginated list of users ordered by creation date.
      parameters:
        - name: limit
          in: query
          description: Maximum number of users to return.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            example: 20
        - name: cursor
          in: query
          description: Cursor returned by the previous page.
          schema:
            type: string
      responses:
        "200":
          description: A page of users.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserList"
        "401":
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /users/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        description: Unique user identifier.
        schema:
          type: string
          format: uuid
    get:
      tags: [Users]
      operationId: getUser
      summary: Retrieve a user
      description: Retrieves a single user profile and account status.
      responses:
        "200":
          description: User details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      tags: [Users]
      operationId: updateUser
      summary: Update a user
      description: Updates profile fields for a user. Omitted fields remain unchanged.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
      responses:
        "200":
          description: Updated user details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "422":
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /users/{userId}/api-keys:
    post:
      tags: [Users]
      operationId: createUserApiKey
      summary: Create an API key
      description: Creates a scoped API key for the selected user.
      parameters:
        - name: userId
          in: path
          required: true
          description: Unique user identifier.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiKeyRequest"
      responses:
        "201":
          description: API key created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKey"
        "403":
          description: Current token does not have permission.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /orders/{orderId}:
    get:
      tags: [Orders]
      operationId: getOrder
      summary: Retrieve an order
      description: Retrieves order totals, line items, shipping address, and fulfillment state.
      parameters:
        - name: orderId
          in: path
          required: true
          description: Unique order identifier.
          schema:
            type: string
            example: ord_9x82b
      responses:
        "200":
          description: Order details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order was not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    UserList:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        pagination:
          type: object
          required: [hasMore]
          properties:
            hasMore:
              type: boolean
            nextCursor:
              type: string
              nullable: true
    User:
      type: object
      required: [id, email, status, profile, createdAt]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        status:
          type: string
          enum: [active, invited, suspended]
        profile:
          $ref: "#/components/schemas/Profile"
        metadata:
          type: object
          additionalProperties:
            type: string
        createdAt:
          type: string
          format: date-time
    Profile:
      type: object
      required: [displayName]
      properties:
        displayName:
          type: string
          example: Ada Lovelace
        avatarUrl:
          type: string
          nullable: true
        company:
          type: object
          properties:
            name:
              type: string
            role:
              type: string
    UpdateUserRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        profile:
          $ref: "#/components/schemas/Profile"
        metadata:
          type: object
          additionalProperties:
            type: string
    CreateApiKeyRequest:
      type: object
      required: [name, scopes]
      properties:
        name:
          type: string
          example: Reporting integration
        scopes:
          type: array
          items:
            type: string
            enum: [users:read, users:write, orders:read]
        expiresAt:
          type: string
          format: date-time
          nullable: true
    ApiKey:
      type: object
      required: [id, name, token, scopes, createdAt]
      properties:
        id:
          type: string
          example: key_123
        name:
          type: string
        token:
          type: string
          description: The token is only returned once.
        scopes:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
    Order:
      type: object
      required: [id, status, total, items, shippingAddress]
      properties:
        id:
          type: string
          example: ord_9x82b
        status:
          type: string
          enum: [pending, paid, fulfilled, canceled]
        total:
          $ref: "#/components/schemas/Money"
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        shippingAddress:
          $ref: "#/components/schemas/Address"
        fulfillment:
          type: object
          properties:
            carrier:
              type: string
            trackingNumber:
              type: string
            events:
              type: array
              items:
                type: object
                required: [status, occurredAt]
                properties:
                  status:
                    type: string
                  occurredAt:
                    type: string
                    format: date-time
    OrderItem:
      type: object
      required: [sku, name, quantity, unitPrice]
      properties:
        sku:
          type: string
        name:
          type: string
        quantity:
          type: integer
        unitPrice:
          $ref: "#/components/schemas/Money"
    Money:
      type: object
      required: [amount, currency]
      properties:
        amount:
          type: integer
          description: Minor units, for example cents.
          example: 1299
        currency:
          type: string
          example: USD
    Address:
      type: object
      required: [line1, city, country, postalCode]
      properties:
        line1:
          type: string
        line2:
          type: string
          nullable: true
        city:
          type: string
        region:
          type: string
          nullable: true
        country:
          type: string
          example: US
        postalCode:
          type: string
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: not_found
        message:
          type: string
        details:
          type: object
          additionalProperties:
            type: string
