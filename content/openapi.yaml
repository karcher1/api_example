openapi: 3.0.3
info:
  title: Example Commerce API
  version: 1.0.0
  description: A single-endpoint showcase specification for the API documentation UI.
servers:
  - url: https://api.example.com/v1
tags:
  - name: Users
    description: Customer identity and access management endpoints.
paths:
  /users/{userId}/api-keys:
    post:
      tags: [Users]
      operationId: createUserApiKey
      summary: Create an API key
      description: Creates a scoped API key for a user. The token is returned only once, so store it securely when the response is received.
      x-docs:
        status: beta
        title: Create an API key
        sectionOrder:
          - overview
          - header-parameters
          - path-parameters
          - query-parameters
          - request-body
          - responses
        blocks:
          - id: auth-warning
            type: notice
            tone: warning
            placement: before:header-parameters
            title: Store the token securely
            body: The secret token is returned only once. Do not log it or send it to client-side applications.
          - id: rotation-note
            type: notice
            tone: info
            placement: after:request-body
            title: Rotation policy
            body: Use the `rotation` object when the credential belongs to a long-lived integration.
          - id: retry-behavior
            type: text
            placement: after:responses
            title: Retry behavior
            body: Use `Idempotency-Key` when retrying create requests. Reusing the same key lets the API return the original result instead of creating duplicate credentials.
        requestExamples:
          - id: php
            label: PHP
            language: php
            value: |
              <?php
              $response = file_get_contents('https://api.example.com/v1/users/018f9f3e-4c10-7a2a-9d2c-32b30f7f28a4/api-keys', false, stream_context_create([
                  'http' => [
                      'method' => 'POST',
                      'header' => "Authorization: Bearer sk_live_51H8example\r\nContent-Type: application/json\r\nIdempotency-Key: req_20260502_create_reporting_key\r\n",
                      'content' => json_encode([
                          'name' => 'Reporting integration',
                          'scopes' => ['users:read', 'orders:read', 'reports:read'],
                          'restrictions' => ['environment' => 'production']
                      ])
                  ]
              ]));
          - id: node
            label: Node.js
            language: javascript
            value: |
              const ddfdfffff response = await fetch("https://api.example.com/v1/users/018f9f3e-4c10-7a2a-9d2c-32b30f7f28a4/api-keys", {
                method: "POST",
                headers: {
                  Authorization: "Bearer sk_live_51H8example",
                  "Content-Type": "application/json",
                  "Idempotency-Key": "req_20260502_create_reporting_key"
                },
                body: JSON.stringify({
                  name: "Reporting integration",
                  scopes: ["users:read", "orders:read", "reports:read"],
                  restrictions: { environment: "production" }
                })
              });
      parameters:
        - name: Authorization
          in: header
          required: true
          description: Bearer access token with permission to manage API keys.
          example: Bearer sk_live_51H8example
          schema:
            type: string
        - name: Idempotency-Key
          in: header
          required: true
          description: Unique key used to safely retry a create request without creating duplicate credentials.
          example: req_20260502_create_reporting_key
          schema:
            type: string
            minLength: 8
            maxLength: 128
            pattern: "^[A-Za-z0-9._:-]+$"
        - name: X-Request-Id
          in: header
          required: false
          description: Optional client-generated request identifier for support and audit correlation.
          example: web-portal-8f2e1a
          schema:
            type: string
            maxLength: 64
        - name: userId
          in: path
          required: true
          description: Unique user identifier that will own the new API key.
          example: 018f9f3e-4c10-7a2a-9d2c-32b30f7f28a4
          schema:
            type: string
            format: uuid
        - name: dryRun
          in: query
          required: false
          description: Validates the request and returns the generated permissions summary without persisting a key.
          example: false
          schema:
            type: boolean
            default: false
        - name: includeSecretPreview
          in: query
          required: false
          description: Adds a masked token preview to the response for UI confirmation screens.
          example: true
          schema:
            type: boolean
            default: true
      requestBody:
        required: true
        description: Configuration for the API key, including display metadata, scopes, expiration policy, and network restrictions.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApiKeyRequest"
            example:
              name: Reporting integration
              description: Read-only key used by the revenue dashboard.
              scopes:
                - users:read
                - orders:read
                - reports:read
              expiresAt: "2026-12-31T23:59:59Z"
              metadata:
                ownerTeam: analytics
                ticket: SEC-2419
              restrictions:
                ipAllowlist:
                  - 203.0.113.10
                  - 203.0.113.11
                allowedOrigins:
                  - https://dashboard.example.com
                environment: production
              rotation:
                enabled: true
                intervalDays: 90
                notifyEmails:
                  - security@example.com
                  - analytics@example.com
      responses:
        "201":
          description: API key created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKey"
              examples:
                created:
                  summary: Created
                  value:
                    id: key_8xK2mR9
                    name: Reporting integration
                    token: sk_live_rpt_51H8example_secret
                    tokenPreview: sk_live_rpt_51H8...cret
                    status: active
                    scopes:
                      - users:read
                      - orders:read
                      - reports:read
                    expiresAt: "2026-12-31T23:59:59Z"
                    restrictions:
                      ipAllowlist:
                        - 203.0.113.10
                        - 203.0.113.11
                      allowedOrigins:
                        - https://dashboard.example.com
                      environment: production
                    rotation:
                      enabled: true
                      intervalDays: 90
                      nextRotationAt: "2026-08-01T00:00:00Z"
                    metadata:
                      ownerTeam: analytics
                      ticket: SEC-2419
                    createdAt: "2026-05-02T12:00:00Z"
                    createdBy:
                      id: 018f9f3e-4c10-7a2a-9d2c-32b30f7f28a4
                      email: admin@example.com
                dryRun:
                  summary: Dry run
                  value:
                    id: preview_key
                    name: Reporting integration
                    token: sk_preview_not_persisted
                    tokenPreview: null
                    status: active
                    scopes:
                      - users:read
                      - orders:read
                      - reports:read
                    expiresAt: "2026-12-31T23:59:59Z"
                    restrictions:
                      environment: production
                    rotation:
                      enabled: true
                      intervalDays: 90
                      nextRotationAt: "2026-08-01T00:00:00Z"
                    metadata: {}
                    createdAt: "2026-05-02T12:00:00Z"
                    createdBy:
                      id: 018f9f3e-4c10-7a2a-9d2c-32b30f7f28a4
                      email: admin@example.com
        "400":
          description: Request body or query parameters are malformed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                malformedJson:
                  summary: Malformed JSON
                  value:
                    code: bad_request
                    message: The request could not be parsed.
                    requestId: req_01HX9Z4Y
                    details:
                      body: JSON payload is invalid.
                invalidQuery:
                  summary: Invalid query
                  value:
                    code: bad_request
                    message: Query parameter includeSecretPreview must be a boolean.
                    requestId: req_01HX9Z4Y
                    details:
                      includeSecretPreview: Expected true or false.
        "401":
          description: Authentication failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: unauthorized
                message: Missing or invalid bearer token.
                requestId: req_01HX9Z4Z
                details:
                  Authorization: Bearer token is required.
        "403":
          description: Current token does not have permission to create API keys for this user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                code: forbidden
                message: The authenticated principal cannot manage keys for this user.
                requestId: req_01HX9Z50
                details:
                  permission: users.api_keys.create
        "422":
          description: Validation failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
              example:
                code: validation_failed
                message: One or more fields failed validation.
                requestId: req_01HX9Z51
                errors:
                  - field: scopes
                    reason: At least one scope is not available for this account.
                  - field: restrictions.ipAllowlist
                    reason: CIDR ranges are not allowed for this account tier.
components:
  schemas:
    CreateApiKeyRequest:
      type: object
      required: [name, scopes, restrictions]
      properties:
        name:
          type: string
          description: Human-readable name shown in dashboards and audit logs.
          example: Reporting integration
          minLength: 3
          maxLength: 80
        description:
          type: string
          nullable: true
          description: Optional purpose statement for the credential.
          example: Read-only key used by the revenue dashboard.
          maxLength: 240
        scopes:
          type: array
          description: Permission scopes granted to the key.
          minItems: 1
          maxItems: 20
          items:
            type: string
            enum: [users:read, users:write, orders:read, reports:read, webhooks:write]
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: Expiration timestamp. Null creates a non-expiring key if policy allows it.
          example: "2026-12-31T23:59:59Z"
        metadata:
          type: object
          description: Free-form string metadata copied into audit logs.
          additionalProperties:
            type: string
        restrictions:
          $ref: "#/components/schemas/ApiKeyRestrictions"
        rotation:
          $ref: "#/components/schemas/RotationPolicy"
    ApiKey:
      type: object
      required: [id, name, token, status, scopes, restrictions, rotation, createdAt, createdBy]
      properties:
        id:
          type: string
          description: Stable API key identifier.
          example: key_8xK2mR9
        name:
          type: string
          description: Display name provided at creation time.
        token:
          type: string
          description: Secret token value. This is returned only once.
        tokenPreview:
          type: string
          nullable: true
          description: Masked token preview for UI confirmation.
        status:
          type: string
          enum: [active, disabled, expired]
          description: Current lifecycle state.
        scopes:
          type: array
          items:
            type: string
          description: Granted permission scopes.
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: Expiration timestamp, or null when the key does not expire.
        restrictions:
          $ref: "#/components/schemas/ApiKeyRestrictions"
        rotation:
          $ref: "#/components/schemas/RotationState"
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Metadata copied from the create request.
        createdAt:
          type: string
          format: date-time
        createdBy:
          $ref: "#/components/schemas/UserReference"
    ApiKeyRestrictions:
      type: object
      required: [environment]
      properties:
        ipAllowlist:
          type: array
          description: Public IP addresses allowed to use the key.
          maxItems: 50
          items:
            type: string
            example: 203.0.113.10
        allowedOrigins:
          type: array
          description: Browser origins allowed to present this key.
          maxItems: 25
          items:
            type: string
            example: https://dashboard.example.com
        environment:
          type: string
          enum: [sandbox, production]
          default: sandbox
          description: Runtime environment where the key can be used.
        dailyRequestLimit:
          type: integer
          nullable: true
          description: Optional daily cap for requests made with this key.
          example: 50000
          minimum: 1000
          maximum: 1000000
    RotationPolicy:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
          description: Whether automatic rotation reminders are enabled.
        intervalDays:
          type: integer
          nullable: true
          description: Number of days between rotation reminders.
          example: 90
          minimum: 30
          maximum: 365
        notifyEmails:
          type: array
          description: Email recipients for rotation reminders.
          maxItems: 10
          items:
            type: string
            format: email
    RotationState:
      allOf:
        - $ref: "#/components/schemas/RotationPolicy"
        - type: object
          properties:
            nextRotationAt:
              type: string
              format: date-time
              nullable: true
              description: Next scheduled rotation reminder timestamp.
    UserReference:
      type: object
      required: [id, email]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
    Error:
      type: object
      required: [code, message, requestId]
      properties:
        code:
          type: string
          description: Machine-readable error code.
          example: forbidden
        message:
          type: string
          description: Human-readable error message.
        requestId:
          type: string
          description: Identifier to provide to support.
        details:
          type: object
          description: Optional field or permission details.
          additionalProperties:
            type: string
    ValidationError:
      type: object
      required: [code, message, requestId, errors]
      properties:
        code:
          type: string
          example: validation_failed
        message:
          type: string
        requestId:
          type: string
        errors:
          type: array
          items:
            type: object
            required: [field, reason]
            properties:
              field:
                type: string
              reason:
                type: string
