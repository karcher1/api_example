    parameters:
      - name: data
        type: object
        description: No description provided in source.
        children:
          - name: message
            type: string
            description: No description provided in source.
            example: Entity not found
      - name: meta
        type: array
        description: No description provided in source.
        items:
          type: string
          description: No description provided in source.
  - status: "422"
