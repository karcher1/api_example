slug: get-initial-order-data
title: Get initial order data
description: Get initial order data
method: GET
path: /api/v3/orders/{orderId}/result
status: lts
headerParameters:
  - name: x-source
    type: string
    required: true
    description: "pass the value shop"
    example: pay-front
  - name: x-id
    type: string
    required: true
    description: No description provided in source.
    example: pay-front-mspy
pathParameters:
  - name: orderId
    type: string
    required: true
    description: "Unique order identifier"
    minLength: 8
    maxLength: 36
    pattern: ^([A-Za-z0-9]{8}|[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[1-5][0-9a-fA-F]{3}-[89abAB][0-9a-fA-F]{3}-[0-9a-fA-F]{12})$
    example: kqBc47ju
queryParameters:
  - name: isMobile
    type: boolean
    required: false
    description: "Indicates whether the request is intended for the mobile version"
    example: "false"
  - name: isForced
    type: boolean
    required: false
    description: No description provided in source.
    example: "false"
requestBodyParameters: []
responses:
  - status: "200"
    description: Charge result details
    parameters:
      - name: data
        type: object
        description: "Main object containing operation/charge data"
        children:
          - name: orderUuid
            type: string
            description: No description provided in source.
            format: uuid
            nullable: true
          - name: chargeId
            type: string
            description: "Unique charge identifier"
            format: uuid
          - name: chargeStatus
            type: string
            description: "Charge status"
            enum:
              - authorized
              - captured
              - confirmed
              - created
              - deferred
              - failed
              - declined
              - redirected
              - settled
              - verified
          - name: provider
            type: string
            description: "Provider / payment provider"
            nullable: true
            example: mspy
          - name: paymentMethodType
            type: string
            description: "Payment method type"
            nullable: true
            enum:
              - alipay
              - apple_pay
              - boleto
              - boleto_flash
              - card
              - google_pay
              - ideal
              - mercado_pago
              - oxxo
              - paysafecard
              - pay_pal
              - paytm
              - pay_with_crypto
              - pix
              - sofort
              - spei
              - upi
              - web_pay
              - wechat
              - wire_transfer
            example: card
          - name: interaction
            type: object
            description: "Interaction parameters (how to proceed with / confirm the payment)"
            nullable: true
            children:
              - name: url
                type: string
                description: "URL for interaction (redirect / invocation)"
              - name: method
                type: string
                description: "HTTP method for the request"
                example: GET
              - name: params
                type: array
                description: "List of parameters/values required for the interaction"
                items:
                  type: string
                  description: No description provided in source.
          - name: error
            type: object
            description: "Error information (if an error occurred)"
            nullable: true
            children:
              - name: uuid
                type: string
                description: "Error identifier (UUID)"
                format: uuid
              - name: code
                type: string
                description: "Error code"
              - name: message
                type: string
                description: "Error message"
              - name: traceId
                type: string
                description: "Trace / correlation identifier for logs"
                nullable: true
                example: 082d86c339533af07c14252afcecc7bd
          - name: hasPostTransaction
            type: boolean
            description: "Indicates whether there is a post-transaction step/action"
            nullable: true
            example: "true"
          - name: thankYouPageType
            type: string
            description: "Type of the \"Thank You\" page to be opened"
            nullable: true
          - name: step
            type: string
            description: "Current process step"
            nullable: true
            enum:
              - READY_FOR_THANK_YOU_PAGE_LONG_TERM
              - READY_FOR_POST_TRANSACTION_REDIRECT
              - READY_FOR_SUCCESS_REDIRECT
              - WAITING_FOR_QR_SCAN
              - WAITING_FOR_PROVIDER_INTERACTION
              - PAYMENT_FAILED
      - name: meta
        type: object
        description: "Provides metadata about the response"
        children:
          - name: type
            type: string
            description: "Data type"
            example: entity
  - status: "204"
    description: Order is still processing
    parameters: []
  - status: "404"
    description: Entity not found
    parameters:
      - name: data
        type: object
        description: No description provided in source.
        children:
          - name: message
            type: string
            description: No description provided in source.
            example: Entity not found
      - name: meta
        type: array
        description: No description provided in source.
        items:
          type: string
          description: No description provided in source.
  - status: "422"
    description: Unprocessable Content
    parameters:
      - name: data
        type: object
        description: No description provided in source.
        children:
          - name: message
            type: string
            description: No description provided in source.
            example: Validation failed
          - name: violations
            type: array
            description: No description provided in source.
            items:
              type: object
              description: No description provided in source.
              children:
                - name: field
                  type: string
                  description: No description provided in source.
                  example: data[productId]
                - name: title
                  type: string
                  description: No description provided in source.
                  example: This value should not be blank.
                - name: values
                  type: string
                  description: No description provided in source.
                  example: 37b08860-926b-4837-983d-68bb34ad4cc8
      - name: meta
        type: array
        description: No description provided in source.
        items:
          type: string
          description: No description provided in source.
  - status: "500"
    description: Something went wrong
    parameters:
      - name: data
        type: object
        description: No description provided in source.
        children:
          - name: message
            type: string
            description: No description provided in source.
            example: Something went wrong
      - name: meta
        type: array
        description: No description provided in source.
        items:
          type: string
          description: No description provided in source.
blocks: []
requestExamples:
  - label: PHP
    language: php
    code: |-
      <?php
      $client = new Client();
      $headers = [
       	'x-date' => '<current date format(Y-m-d H:i:s.u)>',
      	'x-public-key' => '<your public key uuid>',
      	'x-buyer-ip' => <external ip>',
      	'x-token' => '<generated token>',
      	'x-source'=> 'shop',
      	'x-id' => '<your-service-id>',
      	'Content-Type' => 'application/json'
      ];
      $request = new Request('GET', 'https://pay-sandbox.billerbase.com/api/v3/orders/kqJIgkjf/result?isMobile=false&isForced=false', $headers);
      $res = $client->sendAsync($request)->wait();
      echo $res->getBody();
  - label: cURL
    language: bash
    code: |-
      curl --location 'https://pay-sandbox.billerbase.com/api/v3/orders/kqJIgkjf/result?isMobile=false&isForced=false' \
      --header 'x-date: <Y-m-d H:i:s.u (current date)>' \
      --header 'x-public-key: <your public key uuid>' \
      --header 'x-buyer-ip: <external ip>'\
      --header 'x-token: <generated token>' \
      --header 'x-source: shop' \
      --header 'x-id: <your-service-id>' \
      --header 'Content-Type: application/json'
  - label: Node.js
    language: javascript
    code: |-
      var request = require('request');
      var options = {
        'method': 'GET',
        'url': 'https://pay-sandbox.billerbase.com/api/v3/orders/kqJIgkjf/result?isMobile=false&isForced=false',
        'headers': {
          'x-date': '<current date format(Y-m-d H:i:s.u)>',
          'x-public-key': '<your public key uuid>',
          'x-buyer-ip': <external ip>',
          'x-token': '<generated token>',
          'x-source': 'shop',
          'x-id': '<your-service-id>',
          'Content-Type': 'application/json'
        }
      };
      request(options, function (error, response) {
        if (error) throw new Error(error);
        console.log(response.body);
      });
responseExamples:
  - label: "200"
    language: json
    code: |-
      {
        "data": {
          "chargeId": "f5aa9513-0f57-434e-891e-5d1af0169441",
          "chargeStatus": "authorized",
          "provider": "adyen",
          "paymentMethodType": "card",
          "hasPostTransaction": true,
          "thankYouPageType": "regular",
          "step": "READY_FOR_POST_TRANSACTION_REDIRECT"
        },
        "meta": {
          "type": "entity"
        }
      }
