blocks: []
requestExamples:
  - label: cURL
    language: bash
    code: curl -X POST "https://api.example.com/api/v3/buyers/4ca07c05-e384-4182-a01a-dcf76381894a/another-payment-method"
  - label: JSON Body
    language: json
    code: |-
      {
        "products": [
