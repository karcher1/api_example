slug: create-new-order-by-another-payment-method
title: Create new Order by another-payment-method
description: Create new Order by another-payment-method
method: POST
path: /api/v3/buyers/{buyerId}/another-payment-method
status: lts
headerParameters:
  - name: x-public-key
    type: string
    required: true
    description: "a public key that identifies the merchant account (there can be several for one merchant)"
    example: 6cd0070d-70d2-42b2-9223-0b1f828a808d
  - name: x-buyer-ip
    type: string
    required: true
    description: "is responsible for information about the buyer's IP address"
    example: 10.10.10.10
  - name: x-date
    type: string
    required: true
    description: "is responsible for the date and time of sending the request"
    example: 2025-02-19T23:59:59
  - name: x-token
    type: string
    required: true
    description: "generated on the merchant side"
    example: 5cdc01c2d66c52a513f58e077d85660468852fc141d305888416a151a05dc159
  - name: x-source
    type: string
    required: true
    description: "pass the value shop"
    example: pay-front
  - name: x-id
    type: string
    required: true
    description: "merchant name"
    example: pay-front-mspy
  - name: x-google-analytics-client-id
    type: string
    required: true
    description: No description provided in source.
    example: GA1.3.1034945594.1649316099
pathParameters:
  - name: buyerId
    type: string
    required: true
    description: "Unique identifier of the buyer in the system."
    minLength: 36
    maxLength: 36
    pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
    example: 614bf97d-02b8-4855-8ba7-e14bea65920f
queryParameters: []
requestBodyParameters:
  - name: isMobile
    type: boolean
    required: true
    description: "Indicates whether the request is for the mobile version. Its value affects the precheckAutocharge settings."
    nullable: false
  - name: sequence
    type: string
    required: false
    description: "Internal user ID"
    nullable: true
    example: "9876543234567898765"
  - name: currency
    type: string
    required: false
    description: "Specifies the currency in which the prices should be returned. If not transferred, the recommended currency determined by IP will be used."
    default: USD
    minLength: 3
    maxLength: 3
  - name: metaData
    type: object
    required: false
    description: "Object of type \"key-value\", to transmit the internal meta-information of the merchant ( this data is not used by the backend and is transmitted when sending various events on the order )"
  - name: returnUrl
    type: string
    required: false
    description: "The full URL of the merchant page to which the user will be redirected after a successful payment.  NOTE: The merchant may include custom query parameters in the URL using placeholders for values provided in metaData or buyerMeta . These placeholders will be automatically replaced with the corresponding values from the request."
    format: uri
    nullable: true
  - name: products
    type: array
    required: true
    description: "Array of data describing actions performed on the subscription(s)"
    items:
      type: object
      required: false
      description: No description provided in source.
      children:
        - name: actionName
          type: string
          required: false
          description: "Type of action being passed. For this contract, pass purchase ."
          enum:
            - downgrade
            - purchase
            - renew
            - upgrade
        - name: productCode
          type: string
          required: false
          description: "Product code of the item to be purchased"
        - name: couponCode
          type: string
          required: false
          description: "Coupon code to be applied"
          nullable: true
        - name: subscriptionId
          type: string
          required: false
          description: "Unique identifier of the buyer's subscription"
          nullable: true
        - name: discount
          type: string
          required: false
          description: "Discount percentage to be applied"
          nullable: true
        - name: quantity
          type: integer
          required: false
          description: "Quantity of products to purchase. By default - 1."
        - name: autoChargeStatus
          type: boolean
          required: false
          description: Promoted autoChargeStatus for current product
responses:
  - status: "200"
    description: Order created successfully
    parameters:
      - name: data
        type: object
        description: "Contains information about the order.  Note: If the request contains a product that does not exist in the database, you will receive an error 404 - Product not found by merchant and code ."
        children:
          - name: url
            type: string
            description: "Link to the newly created order"
            example: http://pay-front-mspy.minikube/checkout-billing/JcYn4Yw1
          - name: params
            type: object
            description: "Contains concise information about the newly created order"
            children:
              - name: metaData
                type: array
                description: "Represents the transmitted internal meta-information"
                nullable: true
                items:
                  type: object
                  description: No description provided in source.
              - name: sequence
                type: string
                description: "Internal user ID"
                nullable: true
                example: "9876543234567898765"
              - name: discount
                type: integer
                description: "The discount applied to the initial cost of the product. Note: Currently, this field is always returned as null , but all discounts will still be applied to the order."
                nullable: true
                example: "null"
              - name: coupon
                type: string
                description: "The coupon discount applied to the initial cost of the product. Note: Currently, this field is always returned as null , but all discounts will still be applied to the order."
                nullable: true
                example: "null"
              - name: googleAnalyticsClientId
                type: string
                description: "Transmitted client ID for google-analytics"
                nullable: true
                example: ga1234566543
      - name: meta
        type: object
        description: "Provides metadata about the response"
        children:
          - name: type
            type: string
            description: "Data type"
            example: entity
  - status: "404"
    description: Some entity not found
    parameters:
      - name: data
        type: object
        description: No description provided in source.
        children:
          - name: id
            type: string
            description: Unique identifier of the order
          - name: url
            type: string
            description: Order link
      - name: meta
        type: object
        description: No description provided in source.
        children:
          - name: type
            type: string
            description: Type of the response
  - status: "422"
    description: Validation error
    parameters:
      - name: code
        type: number
        description: Error code
        example: "0"
      - name: message
        type: string
        description: Error message text
        example: Malformed request syntax.
      - name: traceId
        type: string
        description: Request identifier
        example: 082d86c339533af07c14252afcecc7bd
      - name: errors
        type: array
        description: Contains error details
        items:
          type: object
          description: No description provided in source.
          children:
            - name: field
              type: string
              description: Indicates the field or its nested path
              example: coupon
            - name: title
              type: string
              description: Detailed error description
              example: Coupon not found.
  - status: "500"
    description: Internal Server Error
    parameters:
      - name: code
        type: number
        description: Error code
        example: "0"
      - name: message
        type: string
        description: Error message text
        example: Short exception description.
      - name: traceId
        type: string
        description: Request identifier
        example: 082d86c339533af07c14252afcecc7bd
blocks: []
requestExamples:
  - label: PHP
    language: php
    code: |-
      <?php
      $client = new Client();
      $headers = [
      'x-date' => '<current date format(Y-m-d H:i:s.u)>',
          'x-public-key' => '<your public key uuid>',
          'x-buyer-ip' => <external ip>',
          'x-token' => '<generated token>',
          'x-source'=> 'shop',
          'x-id' => '<your-service-id>',
          'Content-Type' => 'application/json'
      ];
      $body = '{
        "sequence": "9876543234567898765",
        "isMobile": true,
        "currency": "USD",
        "products": [
          {
            "actionName": "purchase",
            "productCode": "<product_code>",
            "couponCode": "test",
            "discount": "30.24",
            "quantity": 2
          }
        ],
        "metaData": {
          "someKey": "value"
        }
      }';
      $request = new Request('POST', 'ttps://pay-sandbox.billerbase.com/api/v3/buyers/9fcb8e42-4a0c-452b-91de-f7c8fa996e17/another-payment-method', $headers, $body);
      $res = $client->sendAsync($request)->wait();
      echo $res->getBody();
  - label: cURL
    language: bash
    code: |-
      curl --location 'https://pay-sandbox.billerbase.com/api/v3/buyers/9fcb8e42-4a0c-452b-91de-f7c8fa996e17/another-payment-method' \
      --header 'x-date: <Y-m-d H:i:s.u (current date)>' \
      --header 'x-public-key: <your public key uuid>' \
      --header 'x-buyer-ip: <external ip>'\
      --header 'x-token: <generated token>' \
      --header 'x-source: shop' \
      --header 'x-id: <your-service-id>' \
      --header 'Content-Type: application/json' \
      --data '{
          "sequence": "9876543234567898765",
          "isMobile": true,
          "currency": "USD",
          "products": [
              {
                  "actionName": "purchase",
                  "productCode": "<product_code>",
                  "couponCode": "test",
                  "discount": "30.24",
                  "quantity": 2
              }
          ],
