requestExamples:
  - label: PHP
    language: php
    code: |-
      <?php
      $client = new Client();
      $headers = [
         'x-date' => '<current date format(Y-m-d H:i:s.u)>',
          'x-public-key' => '<your public key uuid>',
          'x-buyer-ip' => <external ip>',
          'x-token' => '<generated token>',
          'x-source'=> 'shop',
          'x-id' => '<your-service-id>',
          'Content-Type' => 'application/json'
      ];
      $body = '{
        "isMobile": true,
        "chargeMethodId": "34b0b357-a55b-4486-a1b5-cfd9be752e20",
        "currency": "EUR",
        "metaData": {
          "someKey": "value"
        },
        "products": [
          {
            "actionName": "purchase",
            "productCode": "<product_code>",
            "couponCode": "SUM30",
            "discount": "30.24",
            "quantity": 2
          }
        ]
      }';
      $request = new Request('POST', 'https://pay-sandbox.billerbase.com/api/v3/buyers/9cfba85a-89a0-4f21-89c0-f9a76a897d49/oneclick', $headers, $body);
      $res = $client->sendAsync($request)->wait();
      echo $res->getBody();
