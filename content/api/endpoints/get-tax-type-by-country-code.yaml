    description: Tax type
    parameters:
      - name: type
        type: object
        description: "Tax type"
        example: sales_tax
  - status: "400"
    description: Bad Request
    parameters:
      - name: uuid
        type: string
        description: Unique error identifier
        format: uuid
        example: 6642ea47-568c-4f12-bc85-dc750f5a140e
      - name: code
        type: number
        description: Error code
        example: "3000"
      - name: message
        type: string
        description: Error message text
        example: Malformed request syntax.
      - name: traceId
        type: string
        description: Request identifier
        example: 082d86c339533af07c14252afcecc7bd
  - status: "404"
    description: Tax type not found
    parameters:
      - name: uuid
        type: string
        description: Unique error identifier
