slug: create-order
title: Create order
description: This endpoint is designed to create orders on the Billing side to further process a payment to purchase a product or service.
method: POST
path: /api/v2/initials/url
status: lts
headerParameters:
  - name: x-public-key
    type: string
    required: true
    description: a public key that identifies the merchant account (there can be several for one merchant)
  - name: x-buyer-ip
    type: string
    required: true
    description: is responsible for information about the buyer's IP address
  - name: x-date
    type: string
    required: true
    description: is responsible for the date and time of sending the request
  - name: x-token
    type: string
    required: true
    description: generated on the merchant side
  - name: x-source
    type: string
    required: true
    description: pass the value shop
  - name: x-id
    type: string
    required: true
    description: merchant name
  - name: x-google-analytics-client-id
    type: string
    required: false
    description: client identifier for Google Analytics
pathParameters: []
queryParameters: []
requestBodyParameters:
  - name: returnUrl
    type: string
    required: true
    description: "The full URL of the merchant page to which the user will be redirected after a successful payment. NOTE: The merchant may include custom query parameters in the URL using placeholders for values provided in metaData or buyerMeta. These placeholders will be automatically replaced with the corresponding values from the request."
  - name: product
    type: object
    required: true
    description: Product information for purchase
  - name: currency
    type: string | null
    required: false
    description: "The currency in which the payment will be made. If not transferred, the recommended currency determined by IP will be used. Standard: ISO 4217 Alphabetic."
  - name: code
    type: string
    required: true
    description: Product code to buy
  - name: buyer
    type: object
    required: false
    description: Information about the buyer trying to make the payment. When generating orders from the Shop, the transfer of this key is MANDATORY
  - name: email
    type: string
    required: false
    description: Buyer email to which the purchased product will be linked. Required to establish a connection between previously made payments and a buyer, to connect to an existing account.
  - name: locale
    type: string
    required: false
    description: "Localization language Standard: ISO 639 set 1."
  - name: metaData
    type: object
    required: false
    description: Object of type "key-value", to transmit the internal meta-information of the merchant (this data is not used by the backend and is transmitted when sending various events on the order)
  - name: Attributes for metaData are dynamic
    type: string | array | object
    required: false
    description: Contains transmitted metadata
  - name: buyerMeta
    type: object
    required: false
    description: Object of type "key-value", to transmit the internal meta-information of the merchant (this data is not used by the backend and is transmitted when sending various events on the order)
  - name: Attributes for metaData are dynamic
    type: string | array | object
    required: false
    description: Contains transmitted metadata
  - name: autoChargeStatus
    type: bool | null
    required: false
    description: Specifies autocharge settings for the product. If null is transmitted, the autocharge will be displayed according to the precheck_autocharge_config setting.
  - name: sequence
    type: string
    required: false
    description: Internal user ID
  - name: discount
    type: float
    required: false
    description: "Application of the discount (% value) to the initial cost of the product Standard: min: 0.01, max: 99.99."
  - name: coupon
    type: string
    required: false
    description: Application of the coupon discount to the initial cost of the product. If a discount was applied to the initial price of the product, then the coupon is applied to the price including the discount.
responses:
  - status: "200"
    description: Successful response.
    parameters:
      - name: data
        type: object
        description: Contains information related to the created order
      - name: url
        type: string
        description: Link to the newly created order
      - name: params
        type: object
        description: Contains concise information about the newly created order
      - name: metaData
        type: object
        description: Represents the transmitted internal meta-information
      - name: Attributes for metaData are dynamic
        type: string | array | object
        description: Contains transmitted metadata
      - name: sequence
        type: string
        description: Internal user ID
      - name: discount
        type: integer
        description: The discount applied to the initial cost of the product
      - name: coupon
        type: string
        description: The coupon discount applied to the initial cost of the product. If a discount was applied to the initial price of the product, then the coupon is applied to the price including the discount.
      - name: googleAnalyticsClientId
        type: string
        description: Transmitted client ID for google-analytics
      - name: meta
        type: object
        description: Provides metadata about the response
      - name: type
        type: string
        description: Data type
blocks:
  - type: info
    title: Discount and coupon
    content: |-
      The procedure for applying the discount and coupon to the price is as follows:

      1. First, a discount is applied to the price of the product.
      2. A coupon is then applied to the discounted product price.
      3. If no discount has been applied to the price, then the coupon is applied to the original price.
      4. If a discount has been transmitted but without a coupon, the discounted product price will be received.
      5. If no discount and coupon data have been transmitted, only the product price will be received.
  - type: info
    title: Errors and interpretation
    content: "The list of possible errors for this endpoint, along with their types and interpretation, is provided in the general reference: [Endpoint response errors](https://gateway.billerix.com/docs/api/endpoint-response-errors)."
requestExamples: []
responseExamples:
  - label: "200"
    language: json
    code: |-
      {
        "data": {
          "url": "https://some.url/jw1fe2Mz",
          "params": {
            "metaData": {
              "foo": "bar"
            },
            "sequence": "123456123456123456",
            "discount": 15,
            "coupon": "123456",
            "googleAnalyticsClientId": "GA1.3.1034945594.1649316099"
          }
        },
        "meta": {
          "type": "entity"
        }
      }
