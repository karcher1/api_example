requestExamples:
  - label: PHP
    language: php
    code: |-
      <?php
      $client = new Client();
      $headers = [
              'x-date' => '<current date format(Y-m-d H:i:s.u)>',
              'x-public-key' => '<your public key uuid>',
              'x-buyer-ip' => <external ip>',
              'x-token' => '<generated token>',
              'x-source'=> 'shop',
              'x-id' => '<your-service-id>',
              'Content-Type' => 'application/json'
      ];
      $body = '{
        "products": [
          {
            "productCode": "MMPM",
            "couponCode": "trial",
            "priceCalculationType": {
              "dailyAmount": true,
              "weeklyAmount": true,
              "monthlyAmount": true
            },
            "discount": "10"
          }
        ]
      }';
      $request = new Request('POST', 'https://pay-sandbox.billerbase.com/api/v3/products/shop-prices', $headers, $body);
      $res = $client->sendAsync($request)->wait();
      echo $res->getBody();
  - label: cURL
    language: bash
    code: |-
      curl --location 'https://pay-sandbox.billerbase.com/api/v3/products/shop-prices' \
      --header 'x-date: <Y-m-d H:i:s.u (current date)>' \
      --header 'x-public-key: <your public key uuid>' \
      --header 'x-buyer-ip: <external ip>'\
      --header 'x-token: <generated token>' \
      --header 'x-source: shop' \
      --header 'x-id: <your-service-id>' \
      --header 'Content-Type: application/json' \
      --data '{
          "products": [
              {
                  "productCode": "MMPM",
                  "couponCode": "trial",
                  "priceCalculationType": {
                      "dailyAmount": true,
                      "weeklyAmount": true,
                      "monthlyAmount": true
                  },
                  "discount": "10"
              }
          ]
      }'
