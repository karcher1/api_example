slug: get-prices-for-offer-page
title: Get prices for Offer page
description: This endpoint is used to retrieve product prices for the Offer page. The prices returned in the response can be calculated per product on a per-day, per-week, or per-month basis.
method: POST
path: /api/v3/products/shop-prices
status: lts
headerParameters:
  - name: x-public-key
    type: string
    required: true
    description: a public key that identifies the merchant account (there can be several for one merchant)
  - name: x-buyer-ip
    type: string
    required: true
    description: is responsible for information about the buyer's IP address
  - name: x-date
    type: string
    required: true
    description: is responsible for the date and time of sending the request
  - name: x-token
    type: string
    required: true
    description: generated on the merchant side
  - name: x-source
    type: string
    required: true
    description: pass the value shop
  - name: x-id
    type: string
    required: true
    description: merchant name
pathParameters: []
queryParameters: []
requestBodyParameters:
  - name: currency
    type: string
    required: false
    description: "The currency in which the prices should be returned Standard: ISO 4217 Alphabetic."
  - name: products
    type: array of objects
    required: true
    description: An array of data about actions performed on the subscription(s)
  - name: productCode
    type: string
    required: false
    description: Product code of the item to be purchased
  - name: couponCode
    type: string
    required: false
    description: Coupon code to be applied
  - name: discount
    type: string | (float data)
    required: false
    description: Discount percentage to be applied
  - name: priceCalculationType
    type: object
    required: false
    description: "Controls how price information for the product is displayed: per day, week, or month"
  - name: dailyAmount
    type: bool
    required: false
    description: Includes information on product prices by day
  - name: weeklyAmount
    type: bool
    required: false
    description: Includes information on product prices by week
  - name: monthlyAmount
    type: bool
    required: false
    description: Includes information on product prices by month
responses:
  - status: "200"
    description: Successful response.
    parameters:
      - name: data
        type: object
        description: Contains information related to the order
      - name: currency
        type: string
        description: Currency code
      - name: tax
        type: object
        description: "Contains information about the tax type applied to the subscription product, including the tax type and the country where this tax is applied. Note: If there is no tax information in the database, the response will contain the value null"
      - name: type
        type: string | null
        description: Type of tax
      - name: country
        type: string | null
        description: Country code for which the tax is applied
      - name: products
        type: object
        description: Represents detailed information about the product and prices
      - name: id
        type: string
        description: Unique product identifier
      - name: code
        type: string
        description: Product code
      - name: name
        type: string
        description: Product name in the EN locale
      - name: nameByLocale
        type: string
        description: Product name in the buyer's locale
      - name: durationDays
        type: integer
        description: Product duration in days
      - name: durationWeeks
        type: integer
        description: Product duration in weeks
      - name: durationMonth
        type: integer
        description: Product duration in months
      - name: currentDurationDays
        type: integer
        description: Actual duration of the current subscription (including the trial period). For trial products, currentDurationDays < durationDays. For non-trial products, the values are equal.
      - name: availableForPurchase
        type: bool
        description: Availability for purchase
      - name: availableForShop
        type: bool
        description: Availability for purchase in the Offer page
      - name: availableForControlPanel
        type: bool
        description: Availability for purchase in the CP
      - name: availableForAutocharge
        type: bool
        description: Autocharge availability
      - name: isTrial
        type: bool
        description: Indicates whether the product is a trial version
      - name: prices
        type: object
        description: Contains detailed price information for the product with a breakdown
      - name: amount
        type: object
        description: Contains information about the full price of the product
      - name: origin
        type: string | (float data)
        description: Original amount of the item before discounts and taxes
      - name: amountForDowngrade
