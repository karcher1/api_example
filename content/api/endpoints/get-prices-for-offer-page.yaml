slug: get-prices-for-offer-page
title: Get prices for Offer page
description: This endpoint is used to retrieve product prices for the Offer page. The prices returned in the response can be calculated per product on a per-day, per-week, or per-month basis.
method: POST
path: /api/v3/products/shop-prices
status: lts
headerParameters:
  - name: x-source
    type: string
    required: true
    description: pass the value shop
    example: pay-front
  - name: x-id
    type: string
    required: true
    description: merchant name
    example: pay-front-mspy
pathParameters: []
queryParameters: []
requestBodyParameters:
  - name: currency
    type: string
    required: false
    description: "The currency in which the prices should be returned Standard: ISO 4217 Alphabetic."
    default: USD
    minLength: 3
    maxLength: 3
  - name: products
    type: array
    required: true
    description: An array of data about actions performed on the subscription(s)
    items:
      type: object
      required: false
      description: No description provided in source.
      children:
        - name: productCode
          type: string
          required: false
          description: Product code of the item to be purchased
          example: TESTAH
        - name: couponCode
          type: string
          required: false
          description: Coupon code to be applied
          example: XMAS
        - name: discount
          type: number
          required: false
          description: Discount percentage to be applied
          nullable: true
          minimum: 0.01
          maximum: 99.99
          example: 25.25
        - name: priceCalculationType
          type: object
          required: false
          description: "Controls how price information for the product is displayed: per day, week, or month"
          children:
            - name: dailyAmount
              type: boolean
              required: false
              description: Includes information on product prices by day
            - name: weeklyAmount
              type: boolean
              required: false
              description: Includes information on product prices by week
            - name: monthlyAmount
              type: boolean
              required: false
              description: Includes information on product prices by month
responses:
  - status: "200"
    description: Successful response.
    parameters:
      - name: data
        type: object
        description: Contains information related to the order
        children:
          - name: currency
            type: string
            description: Currency code
            default: USD
            minLength: 3
            maxLength: 3
          - name: tax
            type: object
            description: No description provided in source.
            children:
              - name: type
                type: string
                description: No description provided in source.
                nullable: true
                example: vat
              - name: country
                type: string
                description: Country code for which the tax is applied
                nullable: true
                example: nl
          - name: products
            type: array
            description: Represents detailed information about the product and prices
            items:
              type: object
              description: No description provided in source.
              children:
                - name: nameByLocale
                  type: string
                  description: Product name in the buyer's locale
                  example: mSpy 1-Month Basic Subscription
                - name: durationDays
                  type: integer
                  description: Product duration in days
                  example: "28"
                - name: durationWeeks
                  type: integer
                  description: Product duration in weeks
                  example: "4"
                - name: durationMonth
                  type: integer
                  description: No description provided in source.
                  example: "1"
                - name: availableForPurchase
                  type: boolean
                  description: Availability for purchase
                  example: "true"
                - name: availableForShop
                  type: boolean
                  description: Availability for purchase in the Offer page
                  example: "true"
                - name: availableForControlPanel
                  type: boolean
                  description: Availability for purchase in the CP
                  example: "true"
                - name: availableForAutocharge
                  type: boolean
                  description: Autocharge availability
                  example: "true"
                - name: isTrial
                  type: boolean
                  description: Indicates whether the product is a trial version
                  example: "true"
                - name: id
                  type: string
                  description: Unique product identifier
                  example: cf3755f7-9366-4963-b71c-038bb40f221c
                - name: code
                  type: string
                  description: Product code
                  example: TESTAH
                - name: name
                  type: string
                  description: Product name in the EN locale
                  example: mSpy 1-Month Premium Subscription
                - name: prices
                  type: object
                  description: Contains detailed price information for the product with a breakdown
                  children:
                    - name: amount
                      type: object
                      description: Contains information about the full price of the product
                      children:
                        - name: origin
                          type: string
                          description: Original amount of the item before discounts and taxes
                          example: "50.00"
                        - name: amountForUpgrade
                          type: string
                          description: Amount for performing upgrade
                          nullable: true
                          example: "50.00"
                        - name: amountForDowngrade
                          type: string
                          description: Amount for performing downgrade
                          nullable: true
                          example: "10.00"
                        - name: discountPercent
                          type: number
                          description: Discount percentage applied to the initial amount
                          nullable: true
                          minimum: 0.01
                          maximum: 99.99
                          example: 25.25
                        - name: discount
                          type: string
                          description: Total discount amount applied to the initial amount
                          example: "10.00"
                        - name: amountWithDiscount
                          type: string
                          description: Final amount after the discount is applied
                          example: "40.00"
                        - name: couponPercent
                          type: string
                          description: Percentage of the discount applied from the coupon
                          example: "25.00"
                        - name: couponCode
                          type: string
                          description: Coupon code used for the additional discount
                          nullable: true
                          example: XMAS25
                        - name: coupon
                          type: string
                          description: Total discount amount from the coupon
                          example: "10.00"
                        - name: amountWithDiscountAndCoupon
                          type: string
                          description: Final amount after both the discount and the coupon are applied
                          example: "30.00"
                        - name: taxPercent
                          type: string
                          description: Tax percentage applied to the final amount
                          example: "10.00"
                        - name: tax
                          type: string
                          description: No description provided in source.
                          nullable: true
                          example: "3.00"
                        - name: amountWithDiscountAndCouponAndTax
                          type: string
                          description: Final amount after applying the discount, coupon, and tax
                          example: "33.00"
