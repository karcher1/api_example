    code: |-
      var request = require('request');
      var options = {
        'method': 'POST',
        'url': 'https://pay-sandbox.billerbase.com/api/v3/products/shop-prices',
        'headers': {
          'x-date': '<current date format(Y-m-d H:i:s.u)>',
