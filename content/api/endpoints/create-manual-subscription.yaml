slug: create-manual-subscription
title: Create manual subscription
description: Create manual subscription
method: POST
path: /api/v2/buyers/{buyerId}/subscriptions
status: lts
headerParameters:
  - name: x-public-key
    type: string
    required: true
    description: "a public key that identifies the merchant account (there can be several for one merchant)"
    example: 6cd0070d-70d2-42b2-9223-0b1f828a808d
  - name: x-buyer-ip
    type: string
    required: true
    description: "is responsible for information about the buyer's IP address"
    example: 10.10.10.10
  - name: x-date
    type: string
    required: true
    description: "is responsible for the date and time of sending the request"
    example: 2025-02-19T23:59:59
  - name: x-token
    type: string
    required: true
    description: "generated on the merchant side"
    example: 5cdc01c2d66c52a513f58e077d85660468852fc141d305888416a151a05dc159
  - name: x-source
    type: string
    required: true
    description: "pass the value shop"
    example: pay-front
  - name: x-id
    type: string
    required: true
    description: No description provided in source.
    example: pay-front-mspy
pathParameters:
  - name: buyerId
    type: string
    required: true
    description: "Unique identifier of buyer in the system"
    minLength: 36
    maxLength: 36
    pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
    example: 614bf97d-02b8-4855-8ba7-e14bea65920f
queryParameters: []
requestBodyParameters:
  - name: productId
    type: string
    required: false
    description: "Unique identifier of the product the subscription is created for"
    example: f805233d-3e92-4f14-b8dc-bbc1e7062754
  - name: currency
    type: string
    required: false
    description: "The currency code in which the payment will be processed. Default: USD (if not provided)"
    default: USD
    minLength: 3
    maxLength: 3
  - name: start
    type: string
    required: false
    description: "Index"
    example: 2024-03-06T14:00:00Z
  - name: end
    type: string
    required: false
    description: No description provided in source.
    example: 2024-09-06T14:00:00Z
responses:
  - status: "201"
    description: Subscription successfully created
    parameters:
      - name: data
        type: object
        description: "Contains the main subscription information"
        children:
          - name: id
            type: string
            description: "Unique subscription identifier"
            example: c3b313a4-fc23-4c82-a826-0d5d3809f66d
      - name: meta
        type: object
        description: "Provides metadata about the response"
        children:
          - name: type
            type: string
            description: "Data type"
            example: entity
  - status: "422"
    description: Validation error
    parameters:
      - name: code
        type: number
        description: Error code
        example: "0"
      - name: message
        type: string
        description: Error message text
        example: Malformed request syntax.
      - name: traceId
        type: string
        description: Request identifier
        example: 082d86c339533af07c14252afcecc7bd
      - name: errors
        type: array
        description: Contains error details
        items:
          type: object
          description: No description provided in source.
          children:
            - name: field
              type: string
              description: Indicates the field or its nested path
              example: coupon
            - name: title
              type: string
              description: Detailed error description
              example: Coupon not found.
  - status: "500"
    description: Exception error
    parameters:
      - name: code
        type: number
        description: Error code
        example: "0"
      - name: message
        type: string
        description: Error message text
        example: Short exception description.
      - name: traceId
        type: string
        description: Request identifier
        example: 082d86c339533af07c14252afcecc7bd
blocks: []
requestExamples:
  - label: PHP
    language: php
    code: |-
      <?php
      $client = new Client();
      $headers = [
       'x-date' => '<current date format(Y-m-d H:i:s.u)>',
          'x-public-key' => '<your public key uuid>',
          'x-buyer-ip' => <external ip>',
          'x-token' => '<generated token>',
          'x-source'=> 'shop',
          'x-id' => '<your-service-id>',
          'Content-Type' => 'application/json'
      ];
      $body = '{
        "productId": "c5bc1fb3-1560-4116-8f17-5aa9f5e7b8e9",
        "currency": "USD",
        "start": "2026-01-01T12:44:17.555Z",
        "end": "2026-02-28T12:44:17.555Z"
      }';
      $request = new Request('POST', 'https://pay-sandbox.billerbase.com/api/v2/api/v2/buyers/9a704808-bc43-4a1d-b200-8524cfa9e6e0/subscriptions', $headers, $body);
      $res = $client->sendAsync($request)->wait();
      echo $res->getBody();
  - label: cURL
    language: bash
    code: |-
      curl --location 'https://pay-sandbox.billerbase.com/api/v2/buyers/9a704808-bc43-4a1d-b200-8524cfa9e6e0/subscriptions' \
      --header 'x-date: <Y-m-d H:i:s.u (current date)>' \
      --header 'x-public-key: <your public key uuid>' \
      --header 'x-buyer-ip: <external ip>'\
      --header 'x-token: <generated token>' \
      --header 'x-source: shop' \
      --header 'x-id: <your-service-id>' \
      --header 'Content-Type: application/json' \
      --data '{
          "productId": "c5bc1fb3-1560-4116-8f17-5aa9f5e7b8e9",
          "currency": "USD",
          "start": "2026-01-01T12:44:17.555Z",
          "end": "2026-02-28T12:44:17.555Z"
      }'
  - label: JSON Body
    language: json
    code: |-
      {
          "productId": "c5bc1fb3-1560-4116-8f17-5aa9f5e7b8e9",
          "currency": "USD",
          "start": "2026-01-01T12:44:17.555Z",
          "end": "2026-02-28T12:44:17.555Z"
      }
  - label: Node.js
    language: javascript
    code: |-
      var request = require('request');
      var options = {
        'method': 'POST',
        'url': 'https://pay-sandbox.billerbase.com/api/v2/buyers/9a704808-bc43-4a1d-b200-8524cfa9e6e0/subscriptions',
        'headers': {
          ''x-date': '<current date format(Y-m-d H:i:s.u)>',
          'x-public-key': '<your public key uuid>',
          'x-buyer-ip': <external ip>',
          'x-token': '<generated token>',
          'x-source': 'shop',
          'x-id': '<your-service-id>',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          "productId": "c5bc1fb3-1560-4116-8f17-5aa9f5e7b8e9",
          "currency": "USD",
          "start": "2026-01-01T12:44:17.555Z",
          "end": "2026-02-28T12:44:17.555Z"
        })
      
      };
      request(options, function (error, response) {
        if (error) throw new Error(error);
        console.log(response.body);
      });
responseExamples:
  - label: "201"
    language: json
    code: |-
      {
        "data": {
          "id": "1a7e7bd1-6036-437c-a96a-cd8bccebe528"
        },
        "meta": {
          "type": "entity"
        }
      }
