slug: create-manual-subscription
title: Create manual subscription
description: Create manual subscription
method: POST
path: /api/v2/buyers/{buyerId}/subscriptions
status: lts
headerParameters:
  - name: x-public-key
    type: string
    required: true
    description: No description provided in source.
    example: 6cd0070d-70d2-42b2-9223-0b1f828a808d
  - name: x-buyer-ip
    type: string
    required: true
    description: No description provided in source.
    example: 10.10.10.10
  - name: x-date
    type: string
    required: true
    description: No description provided in source.
    example: 2025-02-19T23:59:59
  - name: x-token
    type: string
    required: true
    description: No description provided in source.
    example: 5cdc01c2d66c52a513f58e077d85660468852fc141d305888416a151a05dc159
  - name: x-source
    type: string
    required: true
    description: No description provided in source.
    example: pay-front
  - name: x-id
    type: string
    required: true
    description: No description provided in source.
    example: pay-front-mspy
pathParameters:
  - name: buyerId
    type: string
    required: true
    description: No description provided in source.
    minLength: 36
    maxLength: 36
    pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
    example: 614bf97d-02b8-4855-8ba7-e14bea65920f
queryParameters: []
requestBodyParameters:
  - name: productId
    type: string
    required: false
    description: No description provided in source.
    example: f805233d-3e92-4f14-b8dc-bbc1e7062754
  - name: currency
    type: string
    required: false
    description: ISO 4217 code
    default: USD
    minLength: 3
    maxLength: 3
  - name: start
    type: string
    required: false
    description: No description provided in source.
    example: 2024-03-06T14:00:00Z
  - name: end
    type: string
    required: false
    description: No description provided in source.
    example: 2024-09-06T14:00:00Z
responses:
  - status: "201"
    description: Subscription successfully created
    parameters:
      - name: data
        type: object
        description: No description provided in source.
        children:
          - name: id
            type: string
            description: No description provided in source.
            example: c3b313a4-fc23-4c82-a826-0d5d3809f66d
      - name: meta
        type: object
        description: No description provided in source.
        children:
          - name: type
            type: string
            description: No description provided in source.
            example: entity
  - status: "422"
    description: Validation error
    parameters:
      - name: code
        type: number
        description: No description provided in source.
        example: "0"
      - name: message
        type: string
        description: Error message
        example: Malformed request syntax.
      - name: traceId
        type: string
        description: Error message
        example: 082d86c339533af07c14252afcecc7bd
      - name: errors
        type: array
        description: Errors list
        items:
          type: object
          description: No description provided in source.
          children:
            - name: field
              type: string
              description: No description provided in source.
              example: coupon
            - name: title
              type: string
              description: No description provided in source.
