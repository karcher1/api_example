requestExamples:
  - label: PHP
    language: php
    code: |-
      <?php
      $client = new Client();
      headers = [
               'x-date' => '<current date format(Y-m-d H:i:s.u)>',
              'x-public-key' => '<your public key uuid>',
              'x-buyer-ip' => <external ip>',
              'x-token' => '<generated token>',
              'x-source'=> 'shop',
              'x-id' => '<your-service-id>',
              'Content-Type' => 'application/json'
      ];
      $body = '{
        "chargeMethodTokenId": 1190595
      }';
      $request = new Request('PUT', 'https://pay-sandbox.billerbase.com/api/v3/buyers/9db2c214-8434-4b9a-8d8d-98b59d9533cb/subscriptions/363b8cef-1e60-445c-9b25-e1bb4aac204e/set-token', $headers, $body);
      $res = $client->sendAsync($request)->wait();
      echo $res->getBody();
  - label: cURL
    language: bash
    code: |-
      curl --location --request PUT 'https://pay-sandbox.billerbase.com/api/v3/buyers/9db2c214-8434-4b9a-8d8d-98b59d9533cb/subscriptions/363b8cef-1e60-445c-9b25-e1bb4aac204e/set-token' \
      --header 'x-date: <Y-m-d H:i:s.u (current date)>' \
      --header 'x-public-key: <your public key uuid>' \
      --header 'x-buyer-ip: <external ip>'\
      --header 'x-token: <generated token>' \
      --header 'x-source: shop' \
      --header 'x-id: <your-service-id>' \
      --header 'Content-Type: application/json' \
      --data '{
          "chargeMethodTokenId": 1190595
      }'
  - label: JSON Body
    language: json
    code: |-
      {
          "chargeMethodTokenId": 1190595
      }
  - label: Node.js
    language: javascript
    code: |-
      var request = require('request');
      var options = {
        'method': 'PUT',
        'url': 'https://pay-sandbox.billerbase.com/api/v3/buyers/9db2c214-8434-4b9a-8d8d-98b59d9533cb/subscriptions/363b8cef-1e60-445c-9b25-e1bb4aac204e/set-token',
        'headers': {
          'x-date': '<current date format(Y-m-d H:i:s.u)>',
          'x-public-key': '<your public key uuid>',
          'x-buyer-ip': <external ip>',
          'x-token': '<generated token>',
          'x-source': 'shop',
          'x-id': '<your-service-id>',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          "chargeMethodTokenId": 1190595
        })
      
      };
      request(options, function (error, response) {
        if (error) throw new Error(error);
        console.log(response.body);
      });
