                            description: Coupon amount applied
                          - name: amountWithDiscountAndCoupon
                            type: string
                            description: Amount after applying discount and coupon
                          - name: taxPercent
                            type: string
                            description: Tax percentage applied to the product
                          - name: tax
                            type: string
                            description: Tax amount applied to the product
                          - name: amountWithDiscountAndCouponAndTax
                            type: string
                            description: Final amount after applying tax
          - name: products
            type: array
            description: No description provided in source.
            items:
              type: object
              description: No description provided in source.
              children:
                - name: id
                  type: string
                  description: Unique identifier of the product
                - name: code
                  type: string
                  description: Product code
                - name: name
                  type: string
                  description: Name of the product
                - name: nameByLocale
                  type: string
                  description: Localized name of the product
                - name: durationDays
                  type: integer
                  description: Duration of the product in days
                - name: durationWeeks
                  type: integer
                  description: Duration of the product in weeks
                - name: durationMonth
                  type: integer
                  description: Duration of the product in months
                - name: availableForPurchase
                  type: boolean
                  description: Indicates if the product is available for purchase
                - name: availableForShop
                  type: boolean
                  description: Indicates if the product is available in the shop
                - name: availableForControlPanel
                  type: boolean
