slug: get-shop-prices-for-bundles
title: Get shop prices for bundles
description: Get shop prices for bundles
method: POST
path: /api/v3/products/shop-prices/bundles
status: lts
headerParameters:
  - name: x-source
    type: string
    required: true
    description: No description provided in source.
    example: pay-front
  - name: x-id
    type: string
    required: true
    description: No description provided in source.
    example: pay-front-mspy
pathParameters: []
queryParameters: []
requestBodyParameters:
  - name: currency
    type: string
    required: false
    description: ISO 4217 code
    default: USD
    minLength: 3
    maxLength: 3
  - name: isMobile
    type: boolean
    required: true
    description: No description provided in source.
  - name: discount
    type: number
    required: false
    description: Applied discount
    nullable: true
    minimum: 0.01
    maximum: 99.99
    example: 25.25
  - name: locale
    type: string
    required: false
    description: No description provided in source.
    example: en
  - name: bundles
    type: array
    required: true
    description: No description provided in source.
    items:
      type: object
      required: false
      description: No description provided in source.
      children:
        - name: bundleHashKey
          type: string
          required: false
          description: No description provided in source.
        - name: products
          type: array
          required: false
          description: No description provided in source.
          items:
            type: object
            required: false
            description: No description provided in source.
            children:
              - name: productHashKey
                type: string
                required: false
                description: No description provided in source.
              - name: productCode
                type: string
                required: false
                description: No description provided in source.
              - name: couponCode
                type: string
                required: false
                description: No description provided in source.
              - name: quantity
                type: integer
                required: false
                description: No description provided in source.
              - name: customPrice
                type: number
                required: false
                description: No description provided in source.
responses:
