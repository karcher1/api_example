                          - name: amountForAction
                            type: string
                            description: Amount calculated for the action
                          - name: discountPercent
                            type: string
                            description: Discount percentage applied
                          - name: discount
                            type: string
                            description: Discount amount applied
                          - name: amountWithDiscount
                            type: string
                            description: Amount after applying discount
                          - name: couponPercent
                            type: string
                            description: Coupon percentage applied
                          - name: couponCode
                            type: string
                            description: Coupon code applied
                          - name: coupon
