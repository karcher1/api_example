        type: object
        description: No description provided in source.
        children:
          - name: currency
            type: string
            description: ISO 4217 code
            default: USD
            minLength: 3
            maxLength: 3
          - name: tax
            type: object
            description: No description provided in source.
            children:
              - name: type
                type: string
                description: Type of tax applied
              - name: country
                type: string
                description: Country where the tax is applied
          - name: chargeMethods
            type: array
            description: No description provided in source.
            items:
              type: object
              description: No description provided in source.
              children:
                - name: paymentMethodType
                  type: string
                  description: Type of payment method used (e.g., card, pay_pal)
                - name: paymentMethodIdentifier
                  type: string
                  description: Identifier of the payment method
                - name: chargeMethodId
                  type: string
                  description: Unique identifier of the charge method
          - name: bundles
            type: array
            description: No description provided in source.
            items:
              type: object
              description: No description provided in source.
              children:
                - name: bundleHashKey
                  type: string
