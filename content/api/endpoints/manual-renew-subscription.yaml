slug: manual-renew-subscription
title: Manual renew subscription
description: Manual renew subscription
method: POST
path: /api/v2/buyers/{buyerId}/subscriptions/{subscriptionId}/renew
status: lts
headerParameters:
  - name: x-public-key
    type: string
    required: true
    description: No description provided in source.
    example: 6cd0070d-70d2-42b2-9223-0b1f828a808d
  - name: x-buyer-ip
    type: string
    required: true
    description: No description provided in source.
    example: 10.10.10.10
  - name: x-date
    type: string
    required: true
    description: No description provided in source.
    example: 2025-02-19T23:59:59
  - name: x-token
    type: string
    required: true
    description: No description provided in source.
    example: 5cdc01c2d66c52a513f58e077d85660468852fc141d305888416a151a05dc159
  - name: x-source
    type: string
    required: true
    description: No description provided in source.
    example: pay-front
  - name: x-id
    type: string
    required: true
    description: No description provided in source.
    example: pay-front-mspy
pathParameters:
  - name: buyerId
    type: string
    required: true
    description: No description provided in source.
    minLength: 36
    maxLength: 36
    pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
    example: 614bf97d-02b8-4855-8ba7-e14bea65920f
  - name: subscriptionId
    type: string
    required: true
    description: No description provided in source.
    minLength: 36
    maxLength: 36
    pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
    example: aaddd8af-700d-4696-8ffd-cc69b8850977
queryParameters: []
requestBodyParameters:
  - name: productId
    type: string
    required: true
    description: No description provided in source.
    format: uuid
responses:
  - status: "200"
    description: Resulted subscription after renew
    parameters:
      - name: data
        type: object
        description: No description provided in source.
        children:
          - name: id
            type: string
            description: No description provided in source.
            example: bb5403a2-8e20-44e9-a70c-55e6886b414e
          - name: startDate
            type: string
            description: No description provided in source.
            example: 2024-01-12T12:55:48+00:00
          - name: endDate
            type: string
            description: No description provided in source.
            example: 2024-06-12T12:55:48+00:00
          - name: status
            type: string
            description: No description provided in source.
            example: active
          - name: autoChargeStatus
            type: boolean
            description: No description provided in source.
            example: "false"
          - name: isManual
            type: boolean
            description: No description provided in source.
            example: "true"
          - name: createdAt
            type: string
            description: No description provided in source.
            example: 2024-01-12T12:56:10+00:00
          - name: statusInfo
            type: array
            description: No description provided in source.
            items:
              type: object
              description: No description provided in source.
              children:
                - name: status
                  type: string
                  description: can be [active, expired, blocked, frozen, disabled, suspended]
                  example: expired
                - name: reason
                  type: string
                  description: No description provided in source.
                  example: Subscription expired
                - name: createdAt
                  type: string
                  description: No description provided in source.
                  example: 2023-06-29T13:05:50+00:00
          - name: freezeDetails
            type: object
            description: No description provided in source.
            nullable: true
            children:
              - name: frozenAt
                type: string
                description: frozen date time at
                example: 2024-03-13T11:14:18+00:00
              - name: unfreezeAt
                type: string
                description: unfreeze date time at (can not be more 366 days)
                example: 2024-04-14T11:14:18+00:00
      - name: meta
        type: object
        description: No description provided in source.
        children:
          - name: type
            type: string
            description: No description provided in source.
            example: entity
blocks: []
requestExamples:
  - label: PHP
    language: php
    code: |-
      <?php
      $client = new Client();
      $headers = [
       'x-date' => '<current date format(Y-m-d H:i:s.u)>',
          'x-public-key' => '<your public key uuid>',
          'x-buyer-ip' => <external ip>',
          'x-token' => '<generated token>',
          'x-source'=> 'shop',
          'x-id' => '<your-service-id>',
          'Content-Type' => 'application/json'
      ];
      $body = '{
        "productId": "d1f19524-df4b-4096-8490-2ede064344e7"
      }';
      $request = new Request('POST', 'https://pay-sandbox.billerbase.com/api/v2/buyers/9a13bd9b-5eee-4633-908e-b6c6d774ee9b/subscriptions/000347bb-61e7-46da-9804-027ad5be7c21/renew', $headers, $body);
      $res = $client->sendAsync($request)->wait();
      echo $res->getBody();
  - label: cURL
    language: bash
    code: |-
      curl --location 'https://pay-sandbox.billerbase.com/api/v2/buyers/9a13bd9b-5eee-4633-908e-b6c6d774ee9b/subscriptions/000347bb-61e7-46da-9804-027ad5be7c21/renew' \
      --header 'x-date: <Y-m-d H:i:s.u (current date)>' \
      --header 'x-public-key: <your public key uuid>' \
      --header 'x-buyer-ip: <external ip>'\
      --header 'x-token: <generated token>' \
      --header 'x-source: shop' \
      --header 'x-id: <your-service-id>' \
      --header 'Content-Type: application/json' \
      --data '{
          "productId": "d1f19524-df4b-4096-8490-2ede064344e7"
      }'
  - label: JSON Body
    language: json
    code: |-
      {
          "productId": "d1f19524-df4b-4096-8490-2ede064344e7"
      }
  - label: Node.js
    language: javascript
    code: |-
      var request = require('request');
      var options = {
        'method': 'POST',
        'url': 'https://pay-sandbox.billerbase.com/api/v2/buyers/9a13bd9b-5eee-4633-908e-b6c6d774ee9b/subscriptions/000347bb-61e7-46da-9804-027ad5be7c21/renew',
        'headers': {
          'x-date': '<current date format(Y-m-d H:i:s.u)>',
          'x-public-key': '<your public key uuid>',
          'x-buyer-ip': <external ip>',
          'x-token': '<generated token>',
          'x-source': 'shop',
          'x-id': '<your-service-id>' ,
          'Content-Type': 'application/json'
       },
        body: JSON.stringify({
          "productId": "d1f19524-df4b-4096-8490-2ede064344e7"
        })
      
      };
      request(options, function (error, response) {
        if (error) throw new Error(error);
        console.log(response.body);
      });
responseExamples: []
