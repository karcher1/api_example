slug: create-order-v3
title: Create initial order
description: This endpoint is designed to create orders on the Billing side to further process a payment to purchase a product or service.
method: POST
path: /api/v3/initials/url
status: lts
headerParameters:
  - name: x-public-key
    type: string
    required: true
    description: a public key that identifies the merchant account (there can be several for one merchant)
    example: 6cd0070d-70d2-42b2-9223-0b1f828a808d
  - name: x-buyer-ip
    type: string
    required: true
    description: is responsible for information about the buyer's IP address
    example: 10.10.10.10
  - name: x-date
    type: string
    required: true
    description: is responsible for the date and time of sending the request
    example: 2025-02-19T23:59:59
  - name: x-token
    type: string
    required: true
    description: generated on the merchant side
    example: 5cdc01c2d66c52a513f58e077d85660468852fc141d305888416a151a05dc159
  - name: x-source
    type: string
    required: true
    description: pass the value shop
    example: pay-front
  - name: x-id
    type: string
    required: true
    description: merchant name
    example: pay-front-mspy
  - name: x-google-analytics-client-id
    type: string
    required: true
    description: client identifier for Google Analytics
    example: GA1.3.1034945594.1649316099
pathParameters: []
queryParameters: []
requestBodyParameters:
  - name: isMobile
    type: boolean
    required: true
    description: Indicates whether the checkout flow is initiated from a mobile device
    example: true
  - name: currency
    type: string
    required: false
    description: "Currency code used for the payment Standard: ISO 4217 Alphabetic."
    nullable: true
    default: USD
    minLength: 3
    maxLength: 3
  - name: discount
    type: number
    required: false
    description: "Application of the discount (% value) to the initial cost of the product Standard: min: 0.01, max: 99.99."
    nullable: true
    minimum: 0.01
    maximum: 99.99
    example: 25.25
  - name: sequence
    type: string
    required: false
    description: Internal user ID
    nullable: true
    minLength: 16
    maxLength: 19
    pattern: ^\d*$
    example: "1234567890123456"
  - name: subbrand
    type: string
    required: false
    description: No description provided in source.
    nullable: true
    example: mspy
  - name: metaData
    type: array
    required: false
    description: Object of type "key-value", to transmit the internal meta-information of the merchant (this data is not used by the backend and is transmitted when sending various events on the order)
    nullable: true
    items:
      type: object
      required: false
      description: No description provided in source.
  - name: buyerMeta
    type: object
    required: false
    description: Object of type "key-value", to transmit the internal meta-information of the merchant (this data is not used by the backend and is transmitted when sending various events on the order)
    nullable: true
    children:
      - name: Attributes for metaData are dynamic
        type: any
        required: false
        description: Contains transmitted metadata
  - name: returnUrl
    type: string
    required: false
    description: "The full URL of the merchant page to which the user will be redirected after a successful payment. NOTE: The merchant may include custom query parameters in the URL using placeholders for values provided in metaData or buyerMeta. These placeholders will be automatically replaced with the corresponding values from the request."
    format: uri
    nullable: true
  - name: products
    type: array
    required: true
    description: Product information for purchase
    items:
      type: object
      required: false
      description: No description provided in source.
      children:
        - name: productCode
          type: string
          required: true
          description: Product code to buy
          minLength: 1
          maxLength: 64
          pattern: ^[A-Z0-9_-]+$
          example: TESTAH
        - name: couponCode
          type: string
          required: false
          description: Coupon code applied to the specific product
          nullable: true
          minLength: 1
          maxLength: 32
          pattern: ^[A-Za-z0-9_-]+$
          example: XMAS20OFF
        - name: quantity
          type: integer
          required: false
          description: Number of product units included in the order
          nullable: true
          default: 1
          minimum: 1
          maximum: 10
          example: 1
        - name: customPrice
          type: number
          required: false
          description: Custom product price that overrides the default price
          format: float
          nullable: true
          minimum: 0.01
          example: 19.99
        - name: autochargeStatus
          type: boolean
          required: false
          description: No description provided in source.
          nullable: true
          example: true
  - name: buyer
    type: object
    required: false
    description: Information about the buyer trying to make the payment. When generating orders from the Shop, the transfer of this key is MANDATORY
    nullable: true
    children:
      - name: email
        type: string
        required: true
        description: Buyer email to which the purchased product will be linked. Required to establish a connection between previously made payments and a buyer, to connect to an existing account.
        format: email
        example: buyer-email@example.test
      - name: locale
        type: string
        required: false
        description: "Localization language Standard: ISO 639 set 1."
        nullable: true
        minLength: 2
        maxLength: 2
        example: en
responses:
  - status: "200"
    description: Successful response.
    parameters:
      - name: data
        type: object
        description: Contains information related to the created order
        children:
          - name: url
            type: string
            description: Link to the newly created order
            example: http://pay-front-mspy.minikube/checkout-billing/JcYn4Yw1
          - name: params
            type: object
            description: Contains concise information about the newly created order
            children:
              - name: metaData
                type: array
                description: Represents the transmitted internal meta-information
                nullable: true
                items:
                  type: object
                  description: No description provided in source.
              - name: sequence
                type: string
                description: Internal user ID
                nullable: true
              - name: discount
                type: integer
                description: The discount applied to the initial cost of the product
                nullable: true
              - name: coupon
                type: string
                description: The coupon discount applied to the initial cost of the product. If a discount was applied to the initial price of the product, then the coupon is applied to the price including the discount.
                nullable: true
              - name: googleAnalyticsClientId
                type: string
                description: Transmitted client ID for google-analytics
                nullable: true
      - name: meta
        type: object
        description: Provides metadata about the response
        children:
          - name: type
            type: string
            description: Data type
            example: entity
  - status: "404"
    description: Error response.
    parameters:
      - name: uuid
        type: string
        description: Error message
        format: uuid
        example: 6642ea47-568c-4f12-bc85-dc750f5a140e
      - name: code
        type: number
        description: No description provided in source.
        example: "3000"
      - name: message
        type: string
        description: Error message
        example: Malformed request syntax.
      - name: traceId
        type: string
        description: Error message
        example: 082d86c339533af07c14252afcecc7bd
  - status: "422"
    description: Error response.
    parameters:
      - name: code
        type: number
        description: No description provided in source.
        example: "0"
      - name: message
        type: string
        description: Error message
        example: Malformed request syntax.
      - name: traceId
        type: string
        description: Error message
        example: 082d86c339533af07c14252afcecc7bd
      - name: errors
        type: array
        description: Errors list
        items:
          type: object
          description: No description provided in source.
          children:
            - name: field
              type: string
              description: No description provided in source.
              example: coupon
            - name: title
              type: string
              description: No description provided in source.
              example: Coupon not found.
  - status: "500"
    description: Error response.
    parameters:
      - name: code
        type: number
        description: No description provided in source.
        example: "0"
      - name: message
        type: string
        description: Exception message
        example: Short exception description.
      - name: traceId
        type: string
        description: Error message
        example: 082d86c339533af07c14252afcecc7bd
blocks:
  - type: info
    title: Errors and interpretation
    content: "The list of possible errors for this endpoint, along with their types and interpretation, is provided in the general reference: [Endpoint response errors](https://gateway.billerix.com/docs/api/endpoint-response-errors)."
requestExamples: []
responseExamples:
  - label: "200"
    language: json
    code: |-
      {
        "data": {
          "url": "https://some.url/jw1fe2Mz",
          "params": {
            "metaData": {
              "foo": "bar"
            },
            "sequence": "123456123456123456",
            "discount": 15,
            "coupon": "123456",
            "googleAnalyticsClientId": "GA1.3.1034945594.1649316099"
          }
        },
        "meta": {
          "type": "entity"
        }
      }
  - label: "404"
    language: json
    code: |-
      {
        "uuid": "3070b9cd-dd52-43eb-bd69-45f27b2d3e92",
        "code": "3000",
        "message": "Malformed request syntax.",
        "traceId": "082d86c339533af07c14252afcecc7bd"
      }
  - label: "422"
    language: json
    code: |-
      {
        "code": "0",
        "message": "Malformed request syntax.",
        "traceId": "082d86c339533af07c14252afcecc7bd",
        "errors": [
          {
            "field": "coupon",
            "title": "Coupon not found."
          }
        ]
      }
  - label: "500"
    language: json
    code: |-
      {
        "code": "0",
        "message": "Short exception description.",
        "traceId": "082d86c339533af07c14252afcecc7bd"
      }
