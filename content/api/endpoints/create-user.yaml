slug: create-user
title: Create user
description: >
  Creates a new user account. Use the **Authorization** header with a valid token.
  See the [Authentication article](/docs/authentication) for more details.
method: POST
path: /v1/users
status: stable

headerParameters:
  - name: Authorization
    type: string
    required: true
    description: >
      Bearer token. Format: `Bearer <token>`.

  - name: Content-Type
    type: string
    required: true
    description: Must be `application/json`.

pathParameters: []

queryParameters:
  - name: sendWelcomeEmail
    type: boolean
    required: false
    description: Whether to send a welcome email after user creation.

requestBodyParameters:
  - name: email
    type: string
    required: true
    description: User email address. Must be a valid email.

  - name: name
    type: string
    required: false
    description: User display name. Maximum 100 characters.

  - name: profile
    type: object
    required: false
    description: Optional profile object.
    children:
      - name: firstName
        type: string
        required: false
        description: User first name.
      - name: lastName
        type: string
        required: false
        description: User last name.

responses:
  - status: 201
    description: User created successfully.
    parameters:
      - name: id
        type: string
        description: Unique user identifier.

      - name: email
        type: string
        description: User email address.

      - name: createdAt
        type: string
        description: Creation date in ISO 8601 format.

  - status: 400
    description: Validation error.
    parameters:
      - name: error
        type: string
        description: Error message.

blocks:
  - type: warning
    title: Verification required
    content: >
      This endpoint is available only for verified accounts.

  - type: note
    title: Idempotency
    content: >
      Use an idempotency key if you need safe retries.

requestExamples:
  - label: cURL
    language: bash
    code: |
      curl -X POST "https://api.example.com/v1/users" \
        -H "Authorization: Bearer TOKEN" \
        -H "Content-Type: application/json" \
        -d '{
          "email": "user@example.com",
          "name": "John Doe"
        }'

  - label: PHP
    language: php
    code: |
      <?php

      $payload = [
          "email" => "user@example.com",
          "name" => "John Doe",
      ];

responseExamples:
  - label: 201 Created
    language: json
    code: |
      {
        "id": "usr_123",
        "email": "user@example.com",
        "createdAt": "2026-01-01T00:00:00Z"
      }

  - label: 400 Validation Error
    language: json
    code: |
      {
        "error": "Invalid email"
      }
