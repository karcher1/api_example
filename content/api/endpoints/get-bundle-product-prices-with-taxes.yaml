  - label: Node.js
    language: javascript
    code: |-
      var request = require('request');
      var options = {
        'method': 'POST',
        'url': 'https://pay-sandbox.billerbase.com/api/v3/buyers/05d4fc43-e539-40d6-882e-0a679e2744fe/products/bundles',
        'headers': {
          'x-date': '<current date format(Y-m-d H:i:s.u)>',
          'x-public-key': '<your public key uuid>',
          'x-buyer-ip': <external ip>',
          'x-token': '<generated token>',
          'x-source': 'shop',
          'x-id': '<your-service-id>',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          "isMobile": true,
