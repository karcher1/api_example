requestExamples:
  - label: PHP
    language: php
    code: |-
      <?php
      $client = new Client();
      $headers = [
       	'x-date' => '<current date format(Y-m-d H:i:s.u)>',
      	'x-public-key' => '<your public key uuid>',
      	'x-buyer-ip' => <external ip>',
      	'x-token' => '<generated token>',
      	'x-source'=> 'shop',
      	'x-id' => '<your-service-id>',
      	'Content-Type' => 'application/json'
      ];
      $body = '{
        "isMobile": true,
        "bundles": [
          {
            "bundleHashKey": "<generate-bundle-string-hash-key>",
            "products": [
              {
                "productHashKey": "<generate-product-string-hash-key>",
                "actionName": "purchase",
                "productCode": "MMPM",
                "couponCode": "trial",
                "discount": 10,
                "priceCalculationType": {
                  "dailyAmount": true,
                  "weeklyAmount": true,
                  "monthlyAmount": true
                }
              }
            ]
          }
        ]
      }';
      $request = new Request('POST', 'https://pay-sandbox.billerbase.com/api/v3/buyers/05d4fc43-e539-40d6-882e-0a679e2744fe/products/bundles', $headers, $body);
      $res = $client->sendAsync($request)->wait();
      echo $res->getBody();
  - label: cURL
