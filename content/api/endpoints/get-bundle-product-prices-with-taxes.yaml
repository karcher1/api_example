slug: get-bundle-product-prices-with-taxes
title: Get bundle product prices with taxes
description: Get bundle product prices with taxes
method: POST
path: /api/v3/buyers/{buyerId}/products/bundles
status: lts
headerParameters:
  - name: x-public-key
    type: string
    required: true
    description: No description provided in source.
    example: 6cd0070d-70d2-42b2-9223-0b1f828a808d
  - name: x-buyer-ip
    type: string
    required: true
    description: No description provided in source.
    example: 10.10.10.10
  - name: x-date
    type: string
    required: true
    description: No description provided in source.
    example: 2025-02-19T23:59:59
  - name: x-token
    type: string
    required: true
    description: No description provided in source.
    example: 5cdc01c2d66c52a513f58e077d85660468852fc141d305888416a151a05dc159
  - name: x-source
    type: string
    required: true
    description: No description provided in source.
    example: pay-front
  - name: x-id
    type: string
    required: true
    description: No description provided in source.
    example: pay-front-mspy
pathParameters:
  - name: buyerId
    type: string
    required: true
    description: No description provided in source.
    minLength: 36
    maxLength: 36
    pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
    example: 614bf97d-02b8-4855-8ba7-e14bea65920f
queryParameters: []
requestBodyParameters:
  - name: isMobile
    type: boolean
    required: true
    description: Indicates if the request is from a mobile device
  - name: currency
    type: string
    required: false
    description: ISO 4217 code
    default: USD
    minLength: 3
    maxLength: 3
  - name: locale
    type: string
    required: false
    description: No description provided in source.
    nullable: true
    minLength: 2
    maxLength: 2
  - name: bundles
    type: object
    required: true
    description: No description provided in source.
    children:
      - name: bundleHashKey
        type: string
        required: true
        description: No description provided in source.
        example: bundlehashKey1
      - name: products
        type: array
        required: true
        description: No description provided in source.
        items:
          type: object
          required: false
          description: No description provided in source.
          children:
            - name: productHashKey
              type: string
              required: true
              description: Unique hash key of the product
              example: productHashKey1
            - name: actionName
              type: string
              required: true
              description: Action to be performed on the product (renew, upgrade, downgrade)
              enum:
                - upgrade
                - downgrade
                - renew
            - name: productCode
              type: string
              required: true
              description: No description provided in source.
              example: TESTAH
            - name: couponCode
              type: string
              required: false
              description: Code of the coupon applied
              example: xmas20off
            - name: discount
              type: number
              required: false
              description: No description provided in source.
              example: "2.45"
            - name: quantity
              type: integer
              required: true
              description: Quantity of the product to be purchased
              example: "2"
            - name: priceCalculationType
              type: object
              required: true
              description: No description provided in source.
              children:
                - name: dailyAmount
                  type: boolean
                  required: true
                  description: Indicates if the price calculation is based on daily
                - name: weeklyAmount
                  type: boolean
                  required: true
                  description: Indicates if the price calculation is based on weekly amount
                  example: "false"
                - name: monthlyAmount
                  type: boolean
                  required: true
                  description: Indicates if the price calculation is based on monthly amount
                  example: "false"
            - name: subscriptionId
              type: string
              required: false
              description: Unique subscription identifier
              format: uuid
              example: 72fcf5ff-aaa9-4ab6-9e95-c0f3ca3295dc
responses:
  - status: "200"
    description: Calculated bundles
    parameters:
      - name: data
        type: object
        description: No description provided in source.
        children:
          - name: currency
            type: string
            description: ISO 4217 code
            default: USD
            minLength: 3
            maxLength: 3
          - name: tax
            type: object
            description: No description provided in source.
            children:
              - name: type
                type: string
                description: Type of tax applied
              - name: country
                type: string
                description: Country where the tax is applied
          - name: chargeMethods
            type: array
            description: No description provided in source.
            items:
              type: object
              description: No description provided in source.
              children:
                - name: paymentMethodType
                  type: string
                  description: Type of payment method used (e.g., card, pay_pal)
                - name: paymentMethodIdentifier
                  type: string
                  description: Identifier of the payment method
                - name: chargeMethodId
                  type: string
                  description: Unique identifier of the charge method
          - name: bundles
            type: array
            description: No description provided in source.
            items:
              type: object
              description: No description provided in source.
              children:
                - name: bundleHashKey
                  type: string
                  description: Unique hash key of the bundle
                - name: totalAmount
                  type: object
                  description: No description provided in source.
                  children:
                    - name: origin
                      type: string
                      description: Original amount of the bundle
                    - name: discountsAndCoupons
                      type: string
                      description: Total discounts and coupons applied
                      nullable: true
                      example: "223.63"
                    - name: amountWithDiscountsAndCoupons
                      type: string
                      description: Amount after applying discounts and coupons
                      nullable: true
                      example: "1225.74"
                    - name: taxPercent
                      type: string
                      description: Tax percentage applied to the bundle
                    - name: tax
                      type: string
                      description: Tax amount applied to the bundle
                    - name: amountWithDiscountsAndCouponsAndTax
                      type: string
                      description: Final amount after applying tax
                      nullable: true
                      example: "1225.74"
                - name: products
                  type: array
                  description: No description provided in source.
                  items:
                    type: object
                    description: No description provided in source.
                    children:
                      - name: productHashKey
                        type: string
                        description: Unique hash key of the product
                      - name: code
                        type: string
                        description: Product code
                      - name: isTrial
                        type: boolean
                        description: Indicates if the product is a trial version
                      - name: action
                        type: string
                        description: Action performed on the product
                      - name: subscriptionId
                        type: string
                        description: Unique identifier of the subscription
                      - name: precheckAutocharge
                        type: object
                        description: No description provided in source.
                        children:
                          - name: isPrechecked
                            type: boolean
                            description: Indicates if autocharge is prechecked
                          - name: isShown
                            type: boolean
                            description: Indicates if autocharge option is shown
                      - name: amount
                        type: object
                        description: No description provided in source.
                        children:
                          - name: origin
                            type: string
                            description: Original amount of the product
                          - name: amountForAction
                            type: string
                            description: Amount calculated for the action
                          - name: discountPercent
                            type: string
                            description: Discount percentage applied
                          - name: discount
                            type: string
                            description: Discount amount applied
                          - name: amountWithDiscount
                            type: string
                            description: Amount after applying discount
                          - name: couponPercent
                            type: string
                            description: Coupon percentage applied
                          - name: couponCode
                            type: string
                            description: Coupon code applied
                          - name: coupon
                            type: string
                            description: Coupon amount applied
                          - name: amountWithDiscountAndCoupon
                            type: string
                            description: Amount after applying discount and coupon
                          - name: taxPercent
                            type: string
                            description: Tax percentage applied to the product
                          - name: tax
                            type: string
                            description: Tax amount applied to the product
                          - name: amountWithDiscountAndCouponAndTax
                            type: string
                            description: Final amount after applying tax
          - name: products
            type: array
            description: No description provided in source.
            items:
              type: object
              description: No description provided in source.
              children:
                - name: id
                  type: string
                  description: Unique identifier of the product
                - name: code
                  type: string
                  description: Product code
                - name: name
                  type: string
                  description: Name of the product
                - name: nameByLocale
                  type: string
                  description: Localized name of the product
                - name: durationDays
                  type: integer
                  description: Duration of the product in days
                - name: durationWeeks
                  type: integer
                  description: Duration of the product in weeks
                - name: durationMonth
                  type: integer
                  description: Duration of the product in months
                - name: availableForPurchase
                  type: boolean
                  description: Indicates if the product is available for purchase
                - name: availableForShop
                  type: boolean
                  description: Indicates if the product is available in the shop
                - name: availableForControlPanel
                  type: boolean
                  description: Indicates if the product is available in the control panel
                - name: availableForAutocharge
                  type: boolean
                  description: Indicates if the product is available for autocharge
      - name: meta
        type: object
        description: No description provided in source.
        children:
          - name: type
            type: string
            description: Type of the response
          - name: total
            type: integer
            description: Total number of items in the response
          - name: offset
            type: integer
            description: Offset of the response
  - status: "404"
    description: Product not found
    parameters:
      - name: uuid
        type: string
        description: Error message
        format: uuid
        example: 6642ea47-568c-4f12-bc85-dc750f5a140e
      - name: code
        type: number
        description: No description provided in source.
        example: "3000"
      - name: message
        type: string
        description: Error message
        example: Malformed request syntax.
      - name: traceId
        type: string
        description: Error message
        example: 082d86c339533af07c14252afcecc7bd
  - status: "422"
    description: Validation error
    parameters:
      - name: code
        type: number
        description: No description provided in source.
        example: "0"
      - name: message
        type: string
        description: Error message
        example: Malformed request syntax.
      - name: traceId
        type: string
        description: Error message
        example: 082d86c339533af07c14252afcecc7bd
      - name: errors
        type: array
        description: Errors list
        items:
          type: object
          description: No description provided in source.
          children:
            - name: field
              type: string
              description: No description provided in source.
              example: coupon
            - name: title
              type: string
              description: No description provided in source.
              example: Coupon not found.
  - status: "500"
    description: Internal Server Error
    parameters:
      - name: code
        type: number
        description: No description provided in source.
        example: "0"
      - name: message
        type: string
        description: Exception message
        example: Short exception description.
      - name: traceId
        type: string
        description: Error message
        example: 082d86c339533af07c14252afcecc7bd
