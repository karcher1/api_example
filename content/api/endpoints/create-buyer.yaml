slug: create-buyer
title: Create buyer
description: Endpoint is responsible for creating a buyer without subscription. Can be used when the buyer is missed not in the system.
method: POST
path: /api/v2/buyers
status: lts
headerParameters:
  - name: x-public-key
    type: string
    required: true
    description: a public key that identifies the merchant account (there can be several for one merchant)
    example: 6cd0070d-70d2-42b2-9223-0b1f828a808d
  - name: x-buyer-ip
    type: string
    required: true
    description: is responsible for information about the buyer's IP address
    example: 10.10.10.10
  - name: x-date
    type: string
    required: true
    description: is responsible for the date and time of sending the request
    example: 2025-02-19T23:59:59
  - name: x-token
    type: string
    required: true
    description: generated on the merchant side
    example: 5cdc01c2d66c52a513f58e077d85660468852fc141d305888416a151a05dc159
  - name: x-source
    type: string
    required: true
    description: pass the value shop
    example: pay-front
  - name: x-id
    type: string
    required: true
    description: merchant name
    example: pay-front-mspy
pathParameters: []
queryParameters: []
requestBodyParameters:
  - name: merchantCode
    type: string
    required: true
    description: Unique merchant code
    example: mspy
  - name: email
    type: string
    required: true
    description: Buyer email
    example: buyer-email@example.test
  - name: country
    type: string
    required: true
    description: "Country code Standard: ISO 3166-1 alpha-2."
    example: US
  - name: zip
    type: string
    required: false
    description: Index
    example: "01000"
  - name: state
    type: string
    required: false
    description: Region/state
    example: NY
  - name: locale
    type: string
    required: false
    description: "Localization language Standard: ISO 639 set 1."
    example: en
  - name: buyerMeta
    type: object
    required: false
    description: No description provided in source.
    nullable: true
    children:
      - name: "{key}"
        type: any
        required: false
        description: Dynamic property value.
responses:
  - status: "201"
    description: Buyer was successfully created
    parameters:
      - name: data
        type: object
        description: Contains basic information about buyer
        children:
          - name: id
            type: string
            description: Unique identifier of buyer in the system
            example: 0f84e398-1096-4c64-abf5-bc4b67b7d4f7
      - name: meta
        type: object
        description: Provides metadata about the response
        children:
          - name: type
            type: string
            description: Data type
            example: entity
blocks:
  - type: info
    title: Errors and interpretation
    content: "The list of possible errors for this endpoint, along with their types and interpretation, is provided in the general reference: [Endpoint response errors](https://gateway.billerix.com/docs/api/endpoint-response-errors)."
requestExamples:
  - label: PHP
    language: php
    code: |-
      <?php
      $client = new Client();
      $headers = [
          'x-date' => '<current date format(Y-m-d H:i:s.u)>',
          'x-public-key' => '<your public key uuid>',
          'x-buyer-ip' => <external ip>',
          'x-token' => '<generated token>',
          'x-source'=> 'shop',
          'x-id' => '<your-service-id>',
          'Content-Type' => 'application/json'
      ];
      $body = '{
        "merchantCode": "<your-brand-code>",
        "email": "test@test.test",
        "country": "nl",
        "zip": null,
        "state": null,
        "locale": "en"
      }';
      $request = new Request('POST', 'https://pay-sandbox.billerbase.com/api/v2/buyers', $headers, $body);
      $res = $client->sendAsync($request)->wait();
      echo $res->getBody();
  - label: cURL
    language: bash
    code: |-
      curl --location 'https://pay-sandbox.billerbase.com/api/v2/buyers' \
      --header 'x-date: <Y-m-d H:i:s.u (current date)>' \
      --header 'x-public-key: <your public key uuid>' \
      --header 'x-buyer-ip: <external ip>'\
      --header 'x-token: <generated token>' \
      --header 'x-source: shop' \
      --header 'Content-Type: application/json' \
      --data-raw '{
        "merchantCode": "<your-brand-code>",
        "email": "test@test.test",
        "country": "nl",
        "zip": null,
        "state": null,
        "locale": "en"
      }'
  - label: JSON
    language: json
    code: |-
      {
        "merchantCode": "<your-brand-code>",
        "email": "test@test.test",
        "country": "nl",
        "zip": null,
        "state": null,
        "locale": "en"
      }
  - label: Node.js
    language: javascript
    code: |-
      var request = require('request');
      var options = {
        'method': 'POST',
        'url': 'https://pay-sandbox.billerbase.com/api/v2/buyers',
        'headers': {
          'x-date': '<current date format(Y-m-d H:i:s.u)>',
          'x-public-key': '<your public key uuid>',
          'x-buyer-ip': <external ip>',
          'x-token': '<generated token>',
          'x-source': 'shop',
          'x-id': '<your-service-id>',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          "merchantCode": "<your-brand-code>",
          "email": "test@test.test",
          "country": "nl",
          "zip": null,
          "state": null,
          "locale": "en"
        })

      };
      request(options, function (error, response) {
        if (error) throw new Error(error);
        console.log(response.body);
      });
responseExamples:
  - label: "200"
    language: json
    code: |-
      {
        "data": {
          "id": "028afc6c-34d4-4925-8b08-4ea88a94a878"
        },
        "meta": {
          "type": "entity"
        }
      }
