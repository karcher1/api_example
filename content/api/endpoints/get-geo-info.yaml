slug: get-geo-info
title: Get buyer's info by IP
description: The endpoint is used to obtain location information based on the IP address. Its purpose is to enable the system to adapt payment flows, currencies, local payment methods, and the interface display according to the user’s country.
method: GET
path: /api/v3/geoip/info
status: lts
headerParameters:
  - name: x-public-key
    type: string
    required: true
    description: a public key that identifies the merchant account (there can be several for one merchant)
  - name: x-buyer-ip
    type: string
    required: true
    description: is responsible for information about the buyer's IP address
  - name: x-date
    type: string
    required: true
    description: is responsible for the date and time of sending the request
  - name: x-token
    type: string
    required: true
    description: generated on the merchant side
  - name: x-source
    type: string
    required: true
    description: pass the value shop
  - name: x-id
    type: string
    required: true
    description: merchant name
pathParameters: []
queryParameters:
  - name: ip
    type: string
    required: true
    description: "Buyer's IP"
  - name: merchant
    type: string
    required: true
    description: Valid merchant name
requestBodyParameters: []
responses:
  - status: "200"
    description: Successful response.
    parameters:
      - name: type
        type: string
        description: Source/type of the geo data
      - name: iso2Code
        type: string
        description: Two-letter country ISO code
      - name: recommendedCurrency
        type: string
        description: Recommended currency ISO code for the location
      - name: possibleVatPercent
        type: integer
        description: "Possible VAT percentage for the country/region. NOTE: Will be removed in future iterations"
      - name: city
        type: object
        description: Object with information about the city
        children:
          - name: name
            type: string
            description: Name of the city
      - name: subdivision
        type: object
        description: Object describing the first-level administrative region (state/province)
        children:
          - name: name
            type: string
            description: Name of the subdivision
          - name: isoCode
            type: string
            description: Subdivision code
      - name: location
        type: object
        description: Object holding detailed geographic and postal information
        children:
          - name: latitude
            type: float
            description: Latitude coordinate of the location (decimal degrees)
          - name: longitude
            type: float
            description: Longitude coordinate of the location (decimal degrees)
          - name: timezone
            type: string
            description: IANA time zone identifier for the location
          - name: postalCode
            type: string
            description: Postal/ZIP code for the location
      - name: continent
        type: object
        description: Object with information about the continent
        children:
          - name: name
            type: string
            description: Name of the continent
          - name: isoCode
            type: string
            description: Continent code
blocks:
  - type: info
    title: Errors and interpretation
    content: "The list of possible errors for this endpoint, along with their types and interpretation, is provided in the general reference: [Endpoint response errors](/api/endpoint-response-errors)."
requestExamples:
  - label: PHP
    language: php
    code: |-
      <?php
      $client = new Client();
      $headers = [
               'x-date' => '<current date format(Y-m-d H:i:s.u)>',
              'x-public-key' => '<your public key uuid>',
              'x-buyer-ip' => <external ip>',
              'x-token' => '<generated token>',
              'x-source'=> 'shop',
              'x-id' => '<your-service-id>',
              'Content-Type' => 'application/json'
      ];
      $request = new Request('GET', 'https://pay-sandbox.billerbase.com/api/v3/geoip/info?merchant=merchant_code_name&ip=117.231.192.168', $headers);
      $res = $client->sendAsync($request)->wait();
      echo $res->getBody();
  - label: cURL
    language: bash
    code: |-
      curl --location 'https://pay-sandbox.billerbase.com/api/v3/geoip/info?merchant=merchant_code_name&ip=117.231.192.168' \
      --header 'x-date: <Y-m-d H:i:s.u (current date)>' \
      --header 'x-public-key: <your public key uuid>' \
      --header 'x-buyer-ip: <external ip>'\
      --header 'x-token: <generated token>' \
      --header 'x-source: shop' \
      --header 'x-id: <your-service-id>' \
      --header 'Content-Type: application/json'
  - label: Node.js
    language: javascript
    code: |-
      var request = require('request');
      var options = {
        'method': 'GET',
        'url': 'https://pay-sandbox.billerbase.com/api/v3/geoip/info?merchant=merchant_code_name&ip=117.231.192.168',
        'headers': {
          'x-date': '<current date format(Y-m-d H:i:s.u)>',
          'x-public-key': '<your public key uuid>',
          'x-buyer-ip': <external ip>',
          'x-token': '<generated token>',
          'x-source': 'shop',
          'x-id': '<your-service-id>',
          'Content-Type': 'application/json'
        }
      };
      request(options, function (error, response) {
        if (error) throw new Error(error);
        console.log(response.body);
      });
responseExamples:
  - label: "200"
    language: json
    code: |-
      {
        "type": "maxmind",
        "iso2Code": "NL",
        "recommendedCurrency": "EUR",
        "possibleVatPercent": 21,
        "city": {
          "name": "Amsterdam"
        },
        "subdivision": {
          "name": "North Holland",
          "isoCode": "NH"
        },
        "location": {
          "latitude": 52.3759,
          "longitude": 4.8975,
          "timezone": "Europe/Amsterdam",
          "postalCode": "1012"
        },
        "continent": {
          "name": "Europe",
          "isoCode": "EU"
        }
      }
