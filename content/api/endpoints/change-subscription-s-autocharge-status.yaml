      <?php
      $client = new Client();
      $headers = [
        'x-date' => '<current date format(Y-m-d H:i:s.u)>',
          'x-public-key' => '<your public key uuid>',
          'x-buyer-ip' => <external ip>',
          'x-token' => '<generated token>',
          'x-source'=> 'shop',
          'x-id' => '<your-service-id>',
          'Content-Type' => 'application/json'
      ];
      $body = '{
        "autochargeStatus": true,
        "reason": "Just chargeback",
        "comment": "some comment"
      }';
      $request = new Request('POST', 'https://pay-sandbox.billerbase.com/api/v2/buyers/a03cc3e3-b802-45ad-8f64-6199ba6d4497/subscriptions/402332d3-7019-4700-8446-98c99a1c6b4b/change_autocharge_status', $headers, $body);
      $res = $client->sendAsync($request)->wait();
      echo $res->getBody();
