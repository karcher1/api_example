slug: manual-upgrade-subscription-by-staff
title: Manual upgrade subscription by staff
description: Manual upgrade subscription by staff
method: POST
path: /api/v2/buyers/{buyerId}/subscriptions/{subscriptionId}/upgrade
status: lts
headerParameters:
  - name: x-public-key
    type: string
    required: true
    description: "a public key that identifies the merchant account (there can be several for one merchant)"
    example: 6cd0070d-70d2-42b2-9223-0b1f828a808d
  - name: x-buyer-ip
    type: string
    required: true
    description: "is responsible for information about the buyer's IP address"
    example: 10.10.10.10
  - name: x-date
    type: string
    required: true
    description: "is responsible for the date and time of sending the request"
    example: 2025-02-19T23:59:59
  - name: x-token
    type: string
    required: true
    description: "generated on the merchant side"
    example: 5cdc01c2d66c52a513f58e077d85660468852fc141d305888416a151a05dc159
  - name: x-source
    type: string
    required: true
    description: "pass the value shop"
    example: pay-front
  - name: x-id
    type: string
    required: true
    description: No description provided in source.
    example: pay-front-mspy
pathParameters:
  - name: buyerId
    type: string
    required: true
    description: "Unique identifier of buyer in the system"
    minLength: 36
    maxLength: 36
    pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
    example: 614bf97d-02b8-4855-8ba7-e14bea65920f
  - name: subscriptionId
    type: string
    required: true
    description: "Unique subscription identifier associated with the buyer"
    minLength: 36
    maxLength: 36
    pattern: ^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$
    example: aaddd8af-700d-4696-8ffd-cc69b8850977
queryParameters: []
requestBodyParameters:
  - name: productId
    type: string
    required: true
    description: No description provided in source.
    format: uuid
responses:
  - status: "200"
    description: Resulted subscription after upgrade
    parameters:
      - name: data
        type: object
        description: "Contains the main subscription information"
        children:
          - name: id
            type: string
            description: "Unique subscription identifier"
            example: bb5403a2-8e20-44e9-a70c-55e6886b414e
          - name: startDate
            type: string
            description: "The subscription start date/time in YYYY-MM-DDTHH:II:SS format (e.g., 2024-02-26T10:38:51 )"
            example: 2024-01-12T12:55:48+00:00
          - name: endDate
            type: string
            description: "The subscription end date/time in YYYY-MM-DDTHH:II:SS format (e.g., 2025-02-26T10:38:51 )"
            example: 2024-06-12T12:55:48+00:00
          - name: status
            type: string
            description: "The subscription status"
            example: active
          - name: autoChargeStatus
            type: boolean
            description: No description provided in source.
            example: "false"
          - name: isManual
            type: boolean
            description: "Indicates whether the subscription was created manually"
            example: "true"
          - name: createdAt
            type: string
            description: "The subscription creation date/time in YYYY-MM-DDTHH:II:SS format (e.g., 2025-02-26T10:38:51 )"
            example: 2024-01-12T12:56:10+00:00
          - name: statusInfo
            type: array
            description: "Represents the subscription status at a specific point in time"
            items:
              type: object
              description: No description provided in source.
              children:
                - name: status
                  type: string
                  description: "The subscription status at a specific point in time"
                  example: expired
                - name: reason
                  type: string
                  description: "The reason for the subscription status change"
                  example: Subscription expired
                - name: createdAt
                  type: string
                  description: "The date/time when the status was changed"
                  example: 2023-06-29T13:05:50+00:00
          - name: freezeDetails
            type: object
            description: "Details about the subscription freeze, if available"
            nullable: true
            children:
              - name: frozenAt
                type: string
                description: "The subscription freeze date"
                example: 2024-03-13T11:14:18+00:00
              - name: unfreezeAt
                type: string
                description: "The subscription unfreeze date"
                example: 2024-04-14T11:14:18+00:00
      - name: meta
        type: object
        description: "Provides metadata about the response"
        children:
          - name: type
            type: string
            description: "Data type"
            example: entity
  - status: "422"
    description: Validation error
    parameters:
      - name: code
        type: number
        description: No description provided in source.
        example: "0"
      - name: message
        type: string
        description: Error message
        example: Malformed request syntax.
      - name: traceId
        type: string
        description: Error message
        example: 082d86c339533af07c14252afcecc7bd
      - name: errors
        type: array
        description: Errors list
        items:
          type: object
          description: No description provided in source.
          children:
            - name: field
              type: string
              description: No description provided in source.
              example: coupon
            - name: title
              type: string
              description: No description provided in source.
              example: Coupon not found.
  - status: "500"
    description: Exception error
    parameters:
      - name: code
        type: number
        description: No description provided in source.
        example: "0"
      - name: message
        type: string
        description: Exception message
        example: Short exception description.
      - name: traceId
        type: string
        description: Error message
        example: 082d86c339533af07c14252afcecc7bd
blocks: []
requestExamples:
  - label: PHP
    language: php
    code: |-
      <?php
      $client = new Client();
      $headers = [
       'x-date' => '<current date format(Y-m-d H:i:s.u)>',
          'x-public-key' => '<your public key uuid>',
          'x-buyer-ip' => <external ip>',
          'x-token' => '<generated token>',
          'x-source'=> 'shop',
          'x-id' => '<your-service-id>',
          'Content-Type' => 'application/json'
      ];
      $body = '{
        "productId": "d1f19524-df4b-4096-8490-2ede064344e7"
      }';
      $request = new Request('POST', 'https://pay-sandbox.billerbase.com/api/v2/buyers/9a13bd9b-5eee-4633-908e-b6c6d774ee9b/subscriptions/000347bb-61e7-46da-9804-027ad5be7c21/upgrade', $headers, $body);
      $res = $client->sendAsync($request)->wait();
      echo $res->getBody();
  - label: cURL
    language: bash
    code: |-
      curl --location 'https://pay-sandbox.billerbase.com/api/v2/buyers/9a13bd9b-5eee-4633-908e-b6c6d774ee9b/subscriptions/000347bb-61e7-46da-9804-027ad5be7c21/upgrade' \
      --header 'x-date: <Y-m-d H:i:s.u (current date)>' \
      --header 'x-public-key: <your public key uuid>' \
      --header 'x-buyer-ip: <external ip>'\
      --header 'x-token: <generated token>' \
      --header 'x-source: shop' \
      --header 'x-id: <your-service-id>' \
      --header 'Content-Type: application/json' \
      --data '{
          "productId": "d1f19524-df4b-4096-8490-2ede064344e7"
      }'
  - label: JSON Body
    language: json
    code: |-
      {
          "productId": "d1f19524-df4b-4096-8490-2ede064344e7"
      }
  - label: Node.js
    language: javascript
    code: |-
      var request = require('request');
      var options = {
        'method': 'POST',
        'url': 'https://pay-sandbox.billerbase.com/api/v2/buyers/9a13bd9b-5eee-4633-908e-b6c6d774ee9b/subscriptions/000347bb-61e7-46da-9804-027ad5be7c21/upgrade',
        'headers': {
          'x-date': '<current date format(Y-m-d H:i:s.u)>',
