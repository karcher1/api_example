slug: one-time-payment
title: One-time payment
description: Intended for generating a checkout URL for a one-time payment (one-time payment) without linking it to products.
method: POST
path: /api/v3/initials/one-time/url
status: lts
headerParameters:
  - name: x-public-key
    type: string
    required: true
    description: a public key that identifies the merchant account (there can be several for one merchant)
    example: 6cd0070d-70d2-42b2-9223-0b1f828a808d
  - name: x-buyer-ip
    type: string
    required: true
    description: is responsible for information about the buyer's IP address
    example: 10.10.10.10
  - name: x-date
    type: string
    required: true
    description: is responsible for the date and time of sending the request
    example: 2025-02-19T23:59:59
  - name: x-token
    type: string
    required: true
    description: generated on the merchant side
    example: 5cdc01c2d66c52a513f58e077d85660468852fc141d305888416a151a05dc159
  - name: x-source
    type: string
    required: true
    description: pass the value shop
    example: pay-front
  - name: x-id
    type: string
    required: true
    description: merchant name
    example: pay-front-mspy
  - name: x-google-analytics-client-id
    type: string
    required: true
    description: client identifier for Google Analytics
    example: GA1.3.1034945594.1649316099
pathParameters: []
queryParameters: []
requestBodyParameters:
  - name: metaData
    type: object
    required: false
    description: Object of type "key-value", to transmit the internal meta-information of the merchant (this data is not used by the backend and is transmitted when sending various events on the order)
  - name: price
    type: object
    required: true
    description: Product information for purchase
    children:
      - name: amount
        type: number
        required: false
        description: Order amount without taxes, not tied to the price catalog on the billing side
        format: float
        example: "55.23"
      - name: currency
        type: string
        required: false
        description: "The currency in which the payment will be made."
        standard: ISO 4217 Alphabetic
        default: USD
        minLength: 3
        maxLength: 3
      - name: withTax
        type: boolean
        required: false
        description: Include tax or not
        nullable: true
  - name: buyer
    type: object
    required: false
    description: Information about the buyer trying to make the payment. When generating orders from the Shop, the transfer of this key is MANDATORY
    nullable: true
    children:
      - name: email
        type: string
        required: true
        description: Buyer email to which the purchased product will be linked. Required to establish a connection between previously made payments and a buyer, to connect to an existing account.
        format: email
        example: buyer-email@example.test
      - name: locale
        type: string
        required: false
        description: Localization language
        standard: ISO 639 set 1
        default: en
        minLength: 2
        maxLength: 2
  - name: returnUrl
    type: string
    required: false
    description: "The full URL of the merchant page to which the user will be redirected after a successful payment. NOTE: The merchant may include custom query parameters in the URL using placeholders for values provided in metaData or buyerMeta. These placeholders will be automatically replaced with the corresponding values from the request."
    format: uri
    nullable: true
responses:
  - status: "200"
    description: Successful response.
    parameters:
      - name: data
        type: object
        description: Contains information related to the created order
        children:
          - name: url
            type: string
            description: Link to the newly created order
            example: http://pay-front-mspy.minikube/checkout-billing/JcYn4Yw1
          - name: params
            type: object
            description: Contains concise information about the newly created order
            children:
              - name: metaData
                type: array
                description: Represents the transmitted internal meta-information
                nullable: true
                items:
                  type: object
                  description: No description provided in source.
              - name: sequence
                type: string
                description: Internal user ID (values will always be null)
                nullable: true
                example: "null"
              - name: discount
                type: integer
                description: The discount applied to the initial cost of the product (values will always be null)
                nullable: true
                example: "null"
              - name: coupon
                type: string
                description: The coupon discount applied to the initial cost of the product. (values will always be null)
                nullable: true
                example: "null"
              - name: googleAnalyticsClientId
                type: string
                description: Transmitted client ID for google-analytics (values will always be null)
                nullable: true
                example: ga1234566543
      - name: meta
        type: object
        description: Provides metadata about the response
        children:
          - name: type
            type: string
            description: Data type
            example: entity
  - status: "404"
    description: Some entity not found
    parameters:
      - name: data
        type: object
        description: Contains information related to the created order
        children:
          - name: id
            type: string
            description: Unique identifier of the order
          - name: url
            type: string
            description: Link to the newly created order
      - name: meta
        type: object
        description: Provides metadata about the response
        children:
          - name: type
            type: string
            description: Data type
  - status: "422"
    description: Validation error
    parameters:
      - name: code
        type: number
        description: No description provided in source.
        example: "0"
      - name: message
        type: string
        description: Error message
        example: Malformed request syntax.
      - name: traceId
        type: string
        description: Error message
        example: 082d86c339533af07c14252afcecc7bd
      - name: errors
        type: array
        description: Errors list
        items:
          type: object
          description: No description provided in source.
          children:
            - name: field
              type: string
              description: No description provided in source.
              example: coupon
            - name: title
              type: string
              description: No description provided in source.
              example: Coupon not found.
  - status: "500"
    description: Internal Server Error
    parameters:
      - name: code
        type: number
        description: No description provided in source.
        example: "0"
      - name: message
        type: string
        description: Exception message
        example: Short exception description.
      - name: traceId
        type: string
        description: Error message
        example: 082d86c339533af07c14252afcecc7bd
blocks:
  - type: info
    title: Purpose
    content: |-
      1. Creates a one-time payment for any merchant.
      2. Allows the merchant to provide any price and currency.
      3. Creates an order and an order-product with autocharge disabled.
  - type: info
    title: Merchant requirements
    content: 1. Must have at least one product with an English translation.
  - type: info
    title: Errors and interpretation
    content: "The list of possible errors for this endpoint, along with their types and interpretation, is provided in the general reference: [Endpoint response errors](https://gateway.billerix.com/docs/api/endpoint-response-errors)."
requestExamples:
  - label: PHP
    language: php
    code: |-
      <?php
      $client = new Client();
      headers = [
       	'x-date' => '<current date format(Y-m-d H:i:s.u)>',
      	'x-public-key' => '<your public key uuid>',
      	'x-buyer-ip' => <external ip>',
      	'x-token' => '<generated token>',
      	'x-source'=> 'shop',
      	'x-id' => '<your-service-id>',
      	'x-google-analytics-client-id' => 'GA1.3.1034945594.1649316099',
      	'Content-Type' => 'application/json'
      ];
      $body = '{
        "price": {
          "amount": "55.55",
          "withTax": false,
          "currency": "USD"
        },
        "buyer": {
          "email": "test.name01+qa2@test.com",
          "locale": "US"
        },
        "metaData": {
          "foo": "bar"
        }
      }';
      $request = new Request('POST', 'https://pay-sandbox.billerbase.com/api/v3/initials/one-time/url', $headers, $body);
      $res = $client->sendAsync($request)->wait();
      echo $res->getBody();
  - label: cURL
    language: bash
    code: |-
      curl --location 'https://pay-sandbox.billerbase.com/api/v3/initials/one-time/url' \
      --header 'x-date: <Y-m-d H:i:s.u (current date)>' \
      --header 'x-public-key: <your public key uuid>' \
      --header 'x-buyer-ip: <external ip>'\
      --header 'x-token: <generated token>' \
      --header 'x-source: shop' \
      --header 'x-id: <your-service-id>' \
      --header 'x-google-analytics-client-id: GA1.3.1034945594.1649316099'  \
      --header 'Content-Type: application/json' \
      --data-raw '{
          "price": { 
              "amount": "55.55", 
              "withTax": false, 
              "currency": "USD" 
          },
          "buyer": { 
              "email": "test.name01+qa2@test.com", 
              "locale": "US" 
          },
          "metaData": {
              "foo": "bar"
          }
      }'
  - label: JSON Body
