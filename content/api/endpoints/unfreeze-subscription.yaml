      $request = new Request('PUT', 'https://pay-sandbox.billerbase.com/api/v2/buyers/9bca2112-f5ef-4cc0-8b4b-29edd921593d/subscriptions/dc9ced63-b819-4a3c-8c47-264e0d41d02c/unfreeze', $headers, $body);
