slug: authentication
title: Authentication
description: How to authenticate API requests.

content: |
  # Authentication

  To authenticate API requests, pass the `Authorization` header.

  ```bash
  curl -H "Authorization: Bearer TOKEN" https://api.example.com/v1/users
  ```

  Use **HTTPS** and keep API tokens private.

  See the [Create user endpoint](/api/create-user).

blocks:
  - type: warning
    title: Keep tokens private
    content: >
      Never expose API tokens in frontend code or public repositories.

