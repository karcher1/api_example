content: |
  # Payment webhooks
  
  **Webhooks** allow your server to automatically receive notifications about events in our system. Instead of periodically polling the API, you configure one endpoint and we send you an HTTP request for each important event.
  
  *To connect webhooks, you need:*
  
  1. Create an HTTPS endpoint that accepts JSON requests.
  2. Send us the URL of this endpoint.
  3. Choose which events you want to receive.
  4. Accept and test webhook.
  
  ## Possible payment events
  
  | Reason | Event | Action | Outcome |
  | --- | --- | --- | --- |
  | To get information about a successful authorization of funds on the customer's account. | `charge_authorize` | `authorize` | The funds are placed on hold in the customer's account; a new subscription is created or the existing subscription is renewed. |
  | To get information about a successful capture of funds from the customer's account. | `charge_capture` | `capture` | The previously held funds are debited from the customer's account; a new subscription is created or the existing subscription is renewed. |
  | To get information about a successful withdrawal of funds from the customer's account. | `charge_settle` | `settle` | The funds are debited from the customer's account and transferred to the merchant's account; a new subscription is created or the existing subscription is renewed. |
  
  ## Webhook-request format
  
  | Attribute | Type | Requirement | Description |
  | --- | --- | --- | --- |
  | `type` | string | mandatory | Type of event. There will always be a charge. |
  | `action` | string | mandatory | Indicates event (charge_authorize, charge_settle, etc) |
  | `merchant` | string | mandatory | Merchant's name |
  | `buyer` | object | mandatory | Contains buyer details |
  | `buyer.id` | string | mandatory | Unique identifier of buyer in the system |
  | `buyer.buyerEmail` | string | mandatory | Buyer email |
  | `buyer.metaData` | valid JSON string (object or array) \| empty array | optional | Contains meta data about buyer. Valid JSON (object or array) is always sent. If there was a void in extra, we correct the empty array, which is also valid JSON |
  | `chargeData` | object | mandatory | Contains charge details |
  | `chargeData.id` | string | mandatory | Charge identifier |
  | `chargeData.status` | string | mandatory | Payment status |
  | `chargeData.buyerId` | string | mandatory | Unique identifier of buyer in the system **(deprecated)**. **Note:** Use the same parameter in the buyer object |
  | `chargeData.buyerEmail` | string | optional | Buyer email **(deprecated)**. **Note:** Use the same parameter in the buyer object |
  | `chargeData.buyerMetaData` | valid JSON string (object or array) \| empty array | optional | Contains meta data about buyer. Valid JSON (object or array) is always sent. If there was a void in extra, we correct the empty array, which is also valid JSON **(deprecated)**. **Note:** Use the same parameter in the buyer object |
  | `chargeData.firstName` | string | Mandatory | Buyer name |
  | `chargeData.lastName` | string | Mandatory | Buyer last name |
  | `chargeData.createdAt` | string | mandatory | Date of creation of payment |
  | `chargeData.isServiceFee` | bool | mandatory | Indicates whether this charge is the main or service fee |
  | `chargeData.order` | object | mandatory | Contains order details |
  | `chargeData.order.id` | string | mandatory | Order identifier |
  | `chargeData.order.type` | string | mandatory | Order type |
  | `chargeData.order.currency` | string | mandatory | Order currency |
  | `chargeData.order.amount` | string | mandatory | Order amount |
  | `chargeData.order.locale` | string | mandatory | Language selected on the checkout page |
  | `chargeData.order.metadata` | valid JSON string (object or array) \| empty array | optional | Contains meta data about order. Valid JSON (object or array) is always sent. If there was a void in extra, we correct the empty array, which is also valid JSON |
  | `chargeData.paymentMethod` | object | mandatory | Information about the payment method |
  | `chargeData.paymentMethod.type` | string | mandatory | Type of payment method |
  | `chargeData.paymentMethod.data` | object | mandatory | Payment details |
  | `chargeData.paymentMethod.data.bin` | string | optional | BIN card |
  | `chargeData.paymentMethod.data.lastFour` | string | optional | Card last four digits |
  | `chargeData.paymentMethod.binData` | object | optional | Object containing card BIN data. Includes information about the first 6 or 8 digits of the card PAN, card brand, issuer, card type, card level, and issuing country. |
  | `chargeData.paymentMethod.binData.bin` | string | mandatory | First 6 or 8 digits of the card PAN used to identify the BIN/IIN |
  | `chargeData.paymentMethod.binData.brand` | string | optional | Payment card brand |
  | `chargeData.paymentMethod.binData.issuer` | string | optional | Name of the bank or financial institution that issued the card |
  | `chargeData.paymentMethod.binData.cardType` | string | optional | Card type, such as debit, credit, or prepaid |
  | `chargeData.paymentMethod.binData.cardLevel` | string | optional | Card level or category within the card brand |
  | `chargeData.paymentMethod.binData.countryIsoTwo` | string | optional | Two-letter ISO country code of the card issuing country in ISO 3166-1 alpha-2 format |
  | `chargeData.provider` | object | mandatory | Contains provider information |
  | `chargeData.provider.name` | string | mandatory | Name of the payment provider |
  | `chargeData.provider.mid` | object | mandatory | Mid details |
  | `chargeData.provider.mid.name` | string | mandatory | The name of the MID through which the payment was made |
  
  ## JSON example
  
  ```json
  {
    "type": "charge",
    "action": "charge_settle",
    "merchant": "lasta",
    "buyer": {
      "id": "UUID",
      "email": "email@email.email",
      "metaData": {
        "key": "value from buyer meta"
      }
    },
    "chargeData": {
      "id": "UUID",
      "status": "settled",
      "buyerId": "UUID",
      "buyerEmail": "email@email.email",
      "buyerMetaData": {
        "key": "value from buyer meta"
      },
      "firstName": "first name",
      "lastName": "last name",
      "createdAt": "2024-03-30 23:35:00.123456",
      "isServiceFee": true,
      "order": {
        "id": "UUID",
        "type": "initial",
        "currency": "USD",
        "amount": "123.12",
        "metaData": {
          "key": "value from order meta"
        },
        "locale": "en"
      },
      "paymentMethod": {
        "type": "card",
        "data": {
          "bin": "123456",
          "lastFour": "1234"
        },
        "binData": {
          "bin": "123456",
          "brand": "visa",
          "issuer": "WELLS FARGO BANK NA",
          "cardType": "DEBIT",
          "cardLevel": "CLASSIC",
          "countryIsoTwo": "US"
        }
      },
      "provider": {
        "name": "provider",
        "mid": {
          "name": "mid"
        }
      }
    }
  }
  ```
